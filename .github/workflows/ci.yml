name: CI

# Gate every push / PR to main: Railway auto-deploys main, so a red build
# here is the last line of defense before a regression reaches the table.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Check templates parse (Jinja)
        run: |
          python - <<'PY'
          import sys, pathlib, jinja2
          env = jinja2.Environment(loader=jinja2.FileSystemLoader('templates'))
          bad = []
          for p in sorted(pathlib.Path('templates').rglob('*.html')):
              rel = p.relative_to('templates')
              try:
                  env.parse(p.read_text(encoding='utf-8'))
              except jinja2.TemplateSyntaxError as e:
                  bad.append(f"{rel}:{e.lineno}: {e.message}")
          if bad:
              print("Template parse errors:")
              for b in bad:
                  print("  " + b)
              sys.exit(1)
          print("OK: all templates parse")
          PY

      - name: Run tests
        run: pytest -q
