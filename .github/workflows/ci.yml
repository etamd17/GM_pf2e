name: CI

# Gate every push / PR to main: Railway auto-deploys main, so a red build
# here is the last line of defense before a regression reaches the table.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Check templates parse (Jinja)
        run: python tools/check_templates.py

      - name: Run tests
        run: pytest -q
