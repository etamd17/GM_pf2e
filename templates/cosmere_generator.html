{% extends "base.html" %}
{% block title %}Generators - Cosmere{% endblock %}
{% block extra_head %}
  /* Cosmere generators. Raw CSS -- base.html already wraps extra_head in <style>;
     never nest a <style> here (the CSS parser eats the first rule). */
  .cg-head { display:flex; align-items:baseline; justify-content:space-between; gap:.8rem; flex-wrap:wrap; border-bottom:1px solid var(--border-card); padding-bottom:.7rem; margin-bottom:1.1rem; }
  .cg-title { display:inline-block; margin:0; font-family:var(--font-display, serif); font-size:1.7rem; font-weight:700; color:var(--storm-100, var(--accent)); }
  .cg-sub { font-size:12px; color:var(--text-on-dark-3); }
  .cg-all { font-size:12px; text-decoration:none; padding:.45rem .9rem; border-radius:8px; background:var(--bg-card-2); border:1px solid color-mix(in srgb, var(--accent) 45%, transparent); color:var(--accent); cursor:pointer; transition:background .12s, border-color .12s; }
  .cg-all:hover { background:color-mix(in srgb, var(--accent) 12%, transparent); border-color:var(--accent); }
  .cg-all:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
  .cg-head-actions { display:flex; align-items:center; gap:.5rem; flex-wrap:wrap; }
  .cg-grid { display:grid; gap:1rem; grid-template-columns:repeat(auto-fill, minmax(320px,1fr)); align-items:start; }
  /* Flatter cells: keep the raised card surface for grouping, but drop the
     teal outline for a neutral hairline so a grid of cards reads calm, not
     like a wall of teal-bordered boxes. Teal is reserved for text + hover. */
  .cg-card { background:var(--bg-card); border:1px solid rgba(255,255,255,.06); border-radius:var(--r-md); padding:.9rem 1rem; }
  .cg-card-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:.5rem; }
  .cg-label { font-family:var(--font-display, serif); font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--accent); }
  .cg-reroll { background:none; border:1px solid rgba(255,255,255,.08); color:var(--text-on-dark-3); border-radius:6px; width:26px; height:26px; cursor:pointer; font-size:14px; line-height:1; transition:color .12s, border-color .12s; }
  .cg-reroll:hover { color:var(--accent); border-color:var(--accent); }
  .cg-reroll:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
  .cg-card-actions { display:flex; align-items:center; gap:.35rem; }
  .cg-copy { background:none; border:1px solid rgba(255,255,255,.08); color:var(--text-on-dark-3); border-radius:6px; width:26px; height:26px; cursor:pointer; line-height:1; display:inline-flex; align-items:center; justify-content:center; transition:color .12s, border-color .12s; }
  .cg-copy:hover { color:var(--accent); border-color:var(--accent); }
  .cg-copy:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
  .cg-copy svg { width:14px; height:14px; }
  /* Pin (keep on Reroll-all), step-back (result history), and batch (roll N). */
  .cg-pin, .cg-back, .cg-batch { background:none; border:1px solid rgba(255,255,255,.08); color:var(--text-on-dark-3); border-radius:6px; height:26px; cursor:pointer; line-height:1; display:inline-flex; align-items:center; justify-content:center; transition:color .12s, border-color .12s, background .12s; }
  .cg-pin, .cg-back { width:26px; }
  .cg-batch { padding:0 7px; font-size:11px; font-weight:700; font-variant-numeric:tabular-nums; }
  .cg-pin:hover, .cg-back:hover, .cg-batch:hover { color:var(--accent); border-color:var(--accent); }
  .cg-pin:focus-visible, .cg-back:focus-visible, .cg-batch:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
  .cg-pin svg { width:13px; height:13px; }
  .cg-back[disabled] { opacity:.35; cursor:default; }
  .cg-back[disabled]:hover { color:var(--text-on-dark-3); border-color:rgba(255,255,255,.08); }
  .cg-card.pinned { border-color:color-mix(in srgb, var(--accent) 45%, transparent); }
  .cg-card.pinned .cg-pin { color:var(--accent); border-color:var(--accent); background:color-mix(in srgb, var(--accent) 12%, transparent); }
  .cg-card.pinned .cg-pin svg { fill:currentColor; }
  .cg-body ol.cg-batch-list { margin:.1rem 0 0; padding-left:1.25em; }
  .cg-body ol.cg-batch-list li { margin:.2rem 0; }
  .cg-body { font-size:13px; color:var(--text-on-dark); line-height:1.55; min-height:2.6em; }
  .cg-body b { color:var(--storm-100, var(--accent)); }
  .cg-body .muted { color:var(--text-on-dark-3); }
  .cg-body.flash { animation:cgFlash .45s ease; }
  @keyframes cgFlash { from { opacity:.2; } to { opacity:1; } }
{% endblock %}
{% block content %}
<div class="cg-head">
  <span>
    <h1 class="cg-title">Cosmere Generators</h1>
    <span class="cg-sub">&nbsp; Rosharan prep, one tap at a time.</span>
  </span>
  <span class="cg-head-actions">
    <button class="cg-all" onclick="cgRerollAll()"><span aria-hidden="true">&#8635;</span> Reroll all</button>
    <button class="cg-all" onclick="cgCopyAll(this)" title="Copy every card as text for your session notes">Copy all</button>
  </span>
</div>

<div class="cg-grid">
  {% for c in cards %}
  <div class="cg-card" data-type="{{ c.type }}">
    <div class="cg-card-head">
      <span class="cg-label">{{ c.label }}</span>
      <span class="cg-card-actions">
        <button class="cg-pin" title="Pin &mdash; keep this when you Reroll all" aria-label="Pin {{ c.label }}" aria-pressed="false" onclick="cgTogglePin('{{ c.type }}', this)"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" aria-hidden="true"><path d="M4 2h8v10l-4-3-4 3z"/></svg></button>
        <button class="cg-back" title="Previous result" aria-label="Previous {{ c.label }}" onclick="cgBack('{{ c.type }}')" disabled><span aria-hidden="true">&#8592;</span></button>
        <button class="cg-copy" title="Copy {{ c.label }}" aria-label="Copy {{ c.label }}" onclick="cgCopy('{{ c.type }}', this)"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" aria-hidden="true"><rect x="5" y="5" width="9" height="9" rx="1.5"/><path d="M3 11V3a1 1 0 0 1 1-1h7"/></svg></button>
        <button class="cg-reroll" title="Reroll {{ c.label }}" aria-label="Reroll {{ c.label }}" onclick="cgReroll('{{ c.type }}')"><span aria-hidden="true">&#8635;</span></button>
        {% if c.type in ['name', 'npc'] %}<button class="cg-batch" title="Roll 5 at once (a crowd)" aria-label="Roll 5 {{ c.label }}" onclick="cgBatch('{{ c.type }}', 5)">&times;5</button>{% endif %}
      </span>
    </div>
    <div class="cg-body" id="cg-{{ c.type }}">{{ c.html|safe }}</div>
  </div>
  {% endfor %}
</div>

<script>
// Per-card result history (a back-stack) + pins, so "Reroll all" keeps the rolls
// you liked and you can step back to an earlier one instead of re-rolling for it.
var HIST = {};
function _hist(t) {
  if (!HIST[t]) { var el = document.getElementById('cg-' + t); HIST[t] = { list: [el ? el.innerHTML : ''], idx: 0 }; }
  return HIST[t];
}
function _render(t, html) {
  var el = document.getElementById('cg-' + t); if (!el) return;
  el.innerHTML = html;
  el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash');
  _updateBack(t);
}
function _updateBack(t) {
  var h = HIST[t], card = document.querySelector('.cg-card[data-type="' + t + '"]');
  if (!card) return; var back = card.querySelector('.cg-back');
  if (back) back.disabled = !(h && h.idx > 0);
}
function _pushResult(t, html) {
  var h = _hist(t);
  h.list = h.list.slice(0, h.idx + 1);   // drop any forward history past the current
  h.list.push(html); h.idx = h.list.length - 1;
  _render(t, html);
}
function cgReroll(t) {
  fetch('/api/cosmere/generate/' + t, { method: 'POST' })
    .then(function (r) { return r.json(); })
    .then(function (d) {
      if (d && d.html) { _pushResult(t, d.html); }
      else if (window.pf2eToast) { pf2eToast('Generate failed', 'error'); }
    })
    .catch(function (e) {
      console.error('Cosmere generate error:', e);
      if (window.pf2eToast) pf2eToast('Generate failed', 'error');
    });
}
function cgBack(t) {
  var h = HIST[t]; if (!h || h.idx <= 0) return;
  h.idx--; _render(t, h.list[h.idx]);
}
function cgRerollAll() {
  document.querySelectorAll('.cg-card').forEach(function (card) {
    if (card.classList.contains('pinned')) return;   // keep pinned results
    cgReroll(card.getAttribute('data-type'));
  });
}
function cgTogglePin(t, btn) {
  var card = document.querySelector('.cg-card[data-type="' + t + '"]'); if (!card) return;
  var on = card.classList.toggle('pinned');
  if (btn) btn.setAttribute('aria-pressed', on ? 'true' : 'false');
}
// Roll several at once (a crowd, a patrol) -> a numbered list in the card body.
function cgBatch(t, n) {
  var jobs = [];
  for (var i = 0; i < n; i++) {
    jobs.push(fetch('/api/cosmere/generate/' + t, { method: 'POST' })
      .then(function (r) { return r.json(); })
      .then(function (d) { return (d && d.html) ? d.html : ''; }));
  }
  Promise.all(jobs).then(function (items) {
    items = items.filter(Boolean);
    if (!items.length) { if (window.pf2eToast) pf2eToast('Generate failed', 'error'); return; }
    _pushResult(t, '<ol class="cg-batch-list"><li>' + items.join('</li><li>') + '</li></ol>');
  }).catch(function (e) {
    console.error('Cosmere batch error:', e);
    if (window.pf2eToast) pf2eToast('Generate failed', 'error');
  });
}

// Copy a string to the clipboard, with a brief checkmark swap on the button
// (icon buttons only) and a toast either way.
function cgCopyText(text, btn) {
  navigator.clipboard.writeText(text).then(function () {
    if (btn) {
      var o = btn.innerHTML;
      btn.innerHTML = '<span aria-hidden="true">&#10003;</span>';
      setTimeout(function () { btn.innerHTML = o; }, 900);
    }
    if (window.pf2eToast) pf2eToast('Copied', 'info');
  }).catch(function (e) {
    console.error('Cosmere copy error:', e);
    if (window.pf2eToast) pf2eToast('Copy failed', 'error');
  });
}
function cgCopy(t, btn) {
  var el = document.getElementById('cg-' + t);
  if (!el) return;
  cgCopyText(el.innerText.trim(), btn);
}
// Copy every generated card as one plain-text block for the GM's session notes.
function cgCopyAll() {
  var parts = [];
  document.querySelectorAll('.cg-card').forEach(function (card) {
    var label = card.querySelector('.cg-label');
    var body = card.querySelector('.cg-body');
    if (body) {
      var t = label ? label.innerText.replace(/\s+/g, ' ').trim().toUpperCase() : '';
      parts.push((t ? t + '\n' : '') + body.innerText.trim());
    }
  });
  if (!parts.length) { if (window.pf2eToast) pf2eToast('Nothing to copy', 'info'); return; }
  cgCopyText(parts.join('\n\n————————————\n\n'), null);
}
</script>
{% endblock %}
