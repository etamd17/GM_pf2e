{% extends "base.html" %}
{% block title %}Generators - Cosmere{% endblock %}
{% block extra_head %}
  /* Cosmere generators. Raw CSS -- base.html already wraps extra_head in <style>;
     never nest a <style> here (the CSS parser eats the first rule). */
  .cg-head { display:flex; align-items:baseline; justify-content:space-between; gap:.8rem; flex-wrap:wrap; border-bottom:1px solid var(--border-rule); padding-bottom:.7rem; margin-bottom:1.1rem; }
  .cg-title { font-family:var(--font-display, serif); font-size:1.7rem; font-weight:700; color:var(--storm-100, var(--accent)); }
  .cg-sub { font-size:12px; color:var(--text-on-dark-3); }
  .cg-all { font-size:12px; text-decoration:none; padding:.45rem .9rem; border-radius:8px; background:var(--bg-card-2); border:1px solid var(--accent); color:var(--accent); cursor:pointer; }
  .cg-all:hover { background:rgba(95,168,224,.14); }
  .cg-grid { display:grid; gap:1rem; grid-template-columns:repeat(auto-fill, minmax(320px,1fr)); align-items:start; }
  .cg-card { background:var(--bg-card); border:1px solid var(--border-card); border-radius:var(--r-md); padding:.9rem 1rem; }
  .cg-card-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:.5rem; }
  .cg-label { font-family:var(--font-display, serif); font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--accent); }
  .cg-reroll { background:none; border:1px solid var(--border-card); color:var(--text-on-dark-3); border-radius:6px; width:26px; height:26px; cursor:pointer; font-size:14px; line-height:1; transition:color .12s, border-color .12s; }
  .cg-reroll:hover { color:var(--accent); border-color:var(--accent); }
  .cg-body { font-size:13px; color:var(--text-on-dark); line-height:1.55; min-height:2.6em; }
  .cg-body b { color:var(--storm-100, var(--accent)); }
  .cg-body .muted { color:var(--text-on-dark-3); }
  .cg-body.flash { animation:cgFlash .45s ease; }
  @keyframes cgFlash { from { opacity:.2; } to { opacity:1; } }
{% endblock %}
{% block content %}
<div class="cg-head">
  <span>
    <span class="cg-title">Cosmere Generators</span>
    <span class="cg-sub">&nbsp; Rosharan prep, one tap at a time.</span>
  </span>
  <button class="cg-all" onclick="cgRerollAll()">&#8635; Reroll all</button>
</div>

<div class="cg-grid">
  {% for c in cards %}
  <div class="cg-card" data-type="{{ c.type }}">
    <div class="cg-card-head">
      <span class="cg-label">{{ c.label }}</span>
      <button class="cg-reroll" title="Reroll {{ c.label }}" onclick="cgReroll('{{ c.type }}')">&#8635;</button>
    </div>
    <div class="cg-body" id="cg-{{ c.type }}">{{ c.html|safe }}</div>
  </div>
  {% endfor %}
</div>

<script>
function cgReroll(t) {
  var el = document.getElementById('cg-' + t);
  if (!el) return;
  fetch('/api/cosmere/generate/' + t, { method: 'POST' })
    .then(function (r) { return r.json(); })
    .then(function (d) {
      if (d && d.html) {
        el.innerHTML = d.html;
        el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash');
      }
    })
    .catch(function () {});
}
function cgRerollAll() {
  document.querySelectorAll('.cg-card').forEach(function (card) {
    cgReroll(card.getAttribute('data-type'));
  });
}
</script>
{% endblock %}
