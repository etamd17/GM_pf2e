<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTT Map - Player View</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            height: 100%; 
            overflow: hidden; 
            background: #000; 
            font-family: system-ui, -apple-system, sans-serif;
            color: #e0e0e0;
        }
        
        #map-container {
            width: 100%;
            height: 100%;
            position: relative;
            cursor: grab;
        }
        #map-container.dragging { cursor: grabbing; }
        
        #map-canvas {
            position: absolute;
            transform-origin: 0 0;
        }
        
        /* Header */
        #header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.85);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            z-index: 100;
            border-bottom: 1px solid #333;
        }
        
        #header a {
            color: #888;
            text-decoration: none;
            font-size: 12px;
        }
        #header a:hover { color: #fff; }
        
        #map-name {
            color: #fff;
            font-weight: 600;
            font-size: 14px;
        }
        
        .player-controls {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .player-input {
            padding: 6px 10px;
            background: #222;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            font-size: 12px;
            width: 140px;
        }
        .player-input:focus { border-color: #3b82f6; outline: none; }
        
        .player-btn {
            padding: 6px 12px;
            background: #2563eb;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 11px;
            cursor: pointer;
        }
        .player-btn:hover { background: #1d4ed8; }
        
        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
        }
        .status-badge.connected { background: #166534; color: #86efac; }
        .status-badge.disconnected { background: #7f1d1d; color: #fca5a5; }
        
        /* Turn Indicator */
        #turn-indicator {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e3a5f;
            border: 2px solid #3b82f6;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            z-index: 100;
            display: none;
            animation: pulse-border 2s infinite;
        }
        
        #turn-indicator.active { display: block; }
        
        @keyframes pulse-border {
            0%, 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
            50% { box-shadow: 0 0 20px 4px rgba(59, 130, 246, 0.4); }
        }
        
        /* Ping Indicator */
        .ping {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 3px solid #fbbf24;
            border-radius: 50%;
            animation: ping-expand 1s ease-out forwards;
            pointer-events: none;
        }
        
        @keyframes ping-expand {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }
        
        /* Status Bar */
        #status-bar {
            position: fixed;
            bottom: 10px;
            left: 10px;
            display: flex;
            gap: 10px;
            z-index: 100;
        }
        
        .status-item {
            background: rgba(0,0,0,0.7);
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 11px;
            color: #888;
        }
        
        /* Action Buttons */
        #action-buttons {
            position: fixed;
            bottom: 10px;
            right: 10px;
            display: flex;
            gap: 8px;
            z-index: 100;
        }
        
        .action-btn {
            padding: 10px 16px;
            background: rgba(0,0,0,0.8);
            border: 1px solid #444;
            border-radius: 8px;
            color: #ccc;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .action-btn:hover { background: #333; border-color: #666; color: #fff; }
        
        /* No map message */
        #no-map {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #666;
        }
        #no-map h2 { font-size: 24px; margin-bottom: 10px; }
        #no-map p { font-size: 14px; }
        
        /* Character Sheet Modal */
        #sheet-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
        }
        #sheet-modal.active { display: flex; }
        
        #sheet-content {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px;
        }
        
        /* Dice Roller */
        #dice-modal {
            position: fixed;
            bottom: 60px;
            right: 10px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 16px;
            z-index: 150;
            display: none;
            width: 280px;
        }
        #dice-modal.active { display: block; }
        
        .dice-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }
        
        .dice-btn {
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .dice-btn:hover { background: #3a3a3a; }
        
        #dice-result {
            background: #252525;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }
        
        @keyframes turnBannerIn { from { transform:translateY(-100%); opacity:0; } to { transform:translateY(0); opacity:1; } }
        @keyframes turnBannerOut { from { transform:translateY(0); opacity:1; } to { transform:translateY(-100%); opacity:0; } }
    </style>
</head>
<body>
    <!-- Header -->
    <div id="header">
        <a href="/player">← Player Hub</a>
        <span id="map-name">{{ current_map.name or 'Map' }}</span>
        
        <div class="player-controls">
            <span style="color: #666; font-size: 11px;">Playing as:</span>
            <input type="text" id="player-name-input" class="player-input" placeholder="Your name">
            <button class="player-btn" onclick="setPlayerName()">Set</button>
            <span id="connection-status" class="status-badge connected">Connected</span>
        </div>
    </div>
    
    <!-- Turn Indicator -->
    <div id="turn-indicator">
        ️ <span id="turn-text">Your Turn!</span>
    </div>
    
    <!-- Map Container -->
    <div id="map-container">
        <canvas id="map-canvas"></canvas>
    </div>
    
    <!-- No map message -->
    <div id="no-map" style="display: none;">
        <h2>🗺 Waiting for Map</h2>
        <p>The GM hasn't loaded a map yet.<br>This page will update automatically.</p>
    </div>
    
    <!-- Status Bar -->
    <div id="status-bar">
        <span class="status-item" id="zoom-display">100%</span>
        <span class="status-item" id="token-status">No token assigned</span>
    </div>
    
    <!-- Action Buttons -->
    <div id="action-buttons">
        <button class="action-btn" onclick="pingLocation()">📍 Ping</button>
        <button class="action-btn" id="player-ruler-btn" onclick="togglePlayerRuler()" title="Ruler (or hold Shift and drag)">📏 Ruler</button>
        <button class="action-btn" onclick="promptRangeRing()" title="Show a range ring on your token">🎯 Range</button>
        <button class="action-btn" onclick="toggleDice()"> Dice</button>
        <button class="action-btn" onclick="showSheet()">📋 Sheet</button>
    </div>
    
    <!-- Dice Modal -->
    <div id="dice-modal">
        <div style="font-size: 12px; color: #888; margin-bottom: 8px;">Quick Roll</div>
        <div class="dice-grid">
            <button class="dice-btn" onclick="rollDice(4)">d4</button>
            <button class="dice-btn" onclick="rollDice(6)">d6</button>
            <button class="dice-btn" onclick="rollDice(8)">d8</button>
            <button class="dice-btn" onclick="rollDice(10)">d10</button>
            <button class="dice-btn" onclick="rollDice(12)">d12</button>
            <button class="dice-btn" onclick="rollDice(20)">d20</button>
            <button class="dice-btn" onclick="rollDice(100)">d100</button>
            <button class="dice-btn" onclick="closeDice()">×</button>
        </div>
        <div id="dice-result">--</div>
    </div>
    
    <!-- Character Sheet Modal -->
    <div id="sheet-modal">
        <div id="sheet-content">
            <div style="display: flex; justify-content: space-between; margin-bottom: 16px;">
                <h2 id="sheet-name">Character Sheet</h2>
                <button onclick="closeSheet()" style="background:none;border:none;color:#888;font-size:20px;cursor:pointer;">×</button>
            </div>
            <div id="sheet-body">
                Loading...
            </div>
        </div>
    </div>
    
    <script>
        // ===========================================
        // STATE
        // ===========================================
        let mapState = {{ current_map | tojson }};
        let canvas, ctx;
        let mapImage = null;
        let viewX = 0, viewY = 0, zoom = 1;
        let isDragging = false;
        let dragStart = { x: 0, y: 0, viewX: 0, viewY: 0, tokenX: 0, tokenY: 0 };

        let playerName = null;
        let myToken = null;
        let draggingToken = null;
        let dragTokenOffset = { x: 0, y: 0 };
        let isMyTurn = false;

        // Visibility cache — computing visibility per frame is the hot path
        // on big maps. Cache keyed by the inputs that actually affect LOS so
        // we only rebuild when walls/tokens/lighting change.
        let _visibilityCache = null;
        let _visibilityKey = '';

        function _ambientMode() {
            // Server canon is mapState.ambient_light; the old `lighting` field
            // is a legacy alias ('darkness' → 'dark' for back-compat).
            const raw = mapState.ambient_light || mapState.lighting || 'bright';
            return raw === 'darkness' ? 'dark' : raw;
        }

        function _myVisionTokens() {
            // Player sees through their assigned token(s). If nothing is
            // assigned to this player yet (spectator view), fall back to
            // every visible PC — matches the old party-view behavior.
            const tokens = (mapState.tokens || []).filter(t => t.visible_to_players !== false);
            if (playerName) {
                const owned = tokens.filter(t =>
                    t.assigned_player === playerName || t.pc_name === playerName);
                if (owned.length > 0) return owned;
            }
            return tokens.filter(t => t.is_pc);
        }

        function _activeLightsPx() {
            // Gather all light emitters in pixel space — free-standing lights
            // from ACTIVE_MAP.lights[] and any token with token.emit_light set
            // (e.g. a PC carrying a torch). Attached lights follow their token
            // through the tween helper so movement animates in lockstep.
            const gs = mapState.grid_size || 70;
            const ox = mapState.grid_offset_x || 0;
            const oy = mapState.grid_offset_y || 0;
            const tokens = mapState.tokens || [];
            const out = [];

            for (const L of (mapState.lights || [])) {
                if (L.enabled === false) continue;
                let lx, ly;
                if (L.attached_to) {
                    const tok = tokens.find(t => t.id === L.attached_to);
                    if (!tok) continue;
                    const size = tok.size || 1;
                    const [ax, ay] = _getAnimatedPosition(tok);
                    lx = ax * gs + ox + (gs * size) / 2;
                    ly = ay * gs + oy + (gs * size) / 2;
                } else {
                    // Free-standing lights carry raw pixel coords.
                    lx = L.x; ly = L.y;
                }
                out.push({
                    x: lx, y: ly,
                    brightPx: (L.bright || 0) * gs,
                    dimPx: ((L.bright || 0) + (L.dim || 0)) * gs,
                    color: L.color || '#ff9c42',
                });
            }

            // Per-token emit_light (a PC with a lit torch equipped).
            for (const t of tokens) {
                const el = t.emit_light;
                if (!el || el.enabled === false) continue;
                if (!el.bright && !el.dim) continue;
                const size = t.size || 1;
                const [ax, ay] = _getAnimatedPosition(t);
                out.push({
                    x: ax * gs + ox + (gs * size) / 2,
                    y: ay * gs + oy + (gs * size) / 2,
                    brightPx: (el.bright || 0) * gs,
                    dimPx: ((el.bright || 0) + (el.dim || 0)) * gs,
                    color: el.color || '#ff9c42',
                });
            }
            return out;
        }

        function _computeVisibilityKey() {
            // Key everything that affects the LOS/light raycast: viewer tokens,
            // walls (including open/closed door state), free lights, token-
            // attached lights, ambient mode, and current player identity.
            const tks = (mapState.tokens || []).map(t =>
                `${t.id}:${t.x},${t.y}:${t.vision_radius || 6}:${t.darkvision ? 1 : 0}:${t.low_light_vision ? 1 : 0}:${t.size || 1}:${t.emit_light ? JSON.stringify(t.emit_light) : 'x'}:${t.assigned_player||''}:${t.pc_name||''}`
            ).join('|');
            const wls = (mapState.walls || []).map(w => {
                const pts = (w.points || []).map(p => `${p[0]|0},${p[1]|0}`).join(',');
                return `${w.id}:${w.type}:${w.open ? 1 : 0}:${w.closed ? 1 : 0}:${pts}`;
            }).join('|');
            const lts = (mapState.lights || []).map(L =>
                `${L.id}:${L.x|0},${L.y|0}:${L.bright}:${L.dim}:${L.attached_to||''}:${L.enabled === false ? 0 : 1}`
            ).join('|');
            const amb = _ambientMode();
            return `${amb}|T[${tks}]|W[${wls}]|L[${lts}]|P=${playerName||''}`;
        }

        function _invalidateVisibilityCache() {
            _visibilityCache = null;
            _visibilityKey = '';
        }

        // Token movement tween — same mechanism as the GM view. Updates arrive
        // via SSE; we interpolate instead of snapping so a friendly orc doesn't
        // teleport into flanking position.
        const _tokenAnims = {};
        const TOKEN_ANIM_MS = 300;
        function _startTokenAnim(tokenId, fromX, fromY, toX, toY) {
            if (fromX === toX && fromY === toY) return;
            _tokenAnims[tokenId] = {
                fromX, fromY, toX, toY,
                start: performance.now(), dur: TOKEN_ANIM_MS
            };
        }
        function _getAnimatedPosition(token) {
            const a = _tokenAnims[token.id];
            if (!a) return [token.x, token.y];
            const t = Math.min(1, (performance.now() - a.start) / a.dur);
            if (t >= 1) { delete _tokenAnims[token.id]; return [a.toX, a.toY]; }
            return [a.fromX + (a.toX - a.fromX) * t, a.fromY + (a.toY - a.fromY) * t];
        }
        function _anyTokenAnimating() { return Object.keys(_tokenAnims).length > 0; }
        
        // Try to get player name from localStorage
        playerName = localStorage.getItem('pf2e_player_name') || new URLSearchParams(window.location.search).get('player');
        
        // Auto-register with server session if we have a saved name
        if (playerName) {
            fetch('/api/map/player/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: playerName })
            });
        }
        
        // ===========================================
        // INITIALIZATION
        // ===========================================
        function init() {
            canvas = document.getElementById('map-canvas');
            ctx = canvas.getContext('2d');
            
            // Set player name input
            if (playerName) {
                document.getElementById('player-name-input').value = playerName;
                updateTokenStatus();
            }
            
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            // Mouse events
            const container = document.getElementById('map-container');
            container.addEventListener('mousedown', onMouseDown);
            container.addEventListener('mousemove', onMouseMove);
            container.addEventListener('mouseup', onMouseUp);
            container.addEventListener('mouseleave', onMouseUp);
            container.addEventListener('wheel', onWheel);
            
            // Load map
            if (mapState.image) {
                loadMapImage(mapState.image);
                document.getElementById('no-map').style.display = 'none';
            } else {
                document.getElementById('no-map').style.display = 'block';
                render();
            }
            
            setupSSE();
        }
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            render();
        }
        
        function loadMapImage(filename) {
            mapImage = new Image();
            mapImage.onload = () => {
                viewX = (canvas.width - mapImage.width * zoom) / 2;
                viewY = (canvas.height - mapImage.height * zoom) / 2;
                render();
            };
            mapImage.src = `/api/map/image/${filename}`;
        }
        
        // ===========================================
        // SSE
        // ===========================================
        function setupSSE() {
            const evtSource = new EventSource('/api/events');
            
            evtSource.addEventListener('map_state', (e) => {
                // Pull filtered state (strips secret doors, hidden tokens,
                // GM notes). The raw SSE payload is the GM-view.
                fetch('/api/map/state').then(r => r.json()).then(newState => {
                    const hadMap = !!mapState.image;
                    mapState = newState;

                    document.getElementById('map-name').textContent = mapState.name || 'Map';

                    if (mapState.image) {
                        document.getElementById('no-map').style.display = 'none';
                        if (!hadMap || !mapImage || !mapImage.src.includes(mapState.image)) {
                            loadMapImage(mapState.image);
                        } else {
                            _invalidateVisibilityCache();
                            render();
                        }
                    } else {
                        document.getElementById('no-map').style.display = 'block';
                        mapImage = null;
                        render();
                    }

                    updateTokenStatus();
                });
            });
            
            evtSource.addEventListener('map_tokens', (e) => {
                // Refresh from the filtered endpoint so visible_to_players /
                // gm_hidden filtering applies. The raw SSE payload is unfiltered.
                const prev = new Map((mapState.tokens || []).map(t => [t.id, {x: t.x, y: t.y}]));
                const applyTokens = (list) => {
                    for (const t of list) {
                        const p = prev.get(t.id);
                        if (p && (p.x !== t.x || p.y !== t.y)) {
                            _startTokenAnim(t.id, p.x, p.y, t.x, t.y);
                        }
                    }
                    mapState.tokens = list;
                    updateTokenStatus();
                    _invalidateVisibilityCache();
                    render();
                };
                fetch('/api/map/state').then(r => r.json()).then(s => {
                    applyTokens(s.tokens || []);
                }).catch(() => {
                    applyTokens(JSON.parse(e.data).tokens);
                });
            });

            evtSource.addEventListener('map_walls', (e) => {
                // Refresh via the filtered endpoint so secret doors the player
                // hasn't discovered arrive as plain walls. Raw SSE payload
                // would leak door locations via dev tools.
                fetch('/api/map/state').then(r => r.json()).then(s => {
                    mapState.walls = s.walls || [];
                    _invalidateVisibilityCache();
                    render();
                }).catch(() => {
                    mapState.walls = JSON.parse(e.data).walls;
                    _invalidateVisibilityCache();
                    render();
                });
            });
            
            evtSource.addEventListener('ping', (e) => {
                const data = JSON.parse(e.data);
                showPing(data.x, data.y, data.player);
            });
            
            evtSource.addEventListener('turn_update', (e) => {
                const data = JSON.parse(e.data);
                checkIfMyTurn(data.current_token);
            });
            
            evtSource.addEventListener('encounter_update', (e) => {
                try {
                    const data = JSON.parse(e.data);
                    if (data.active_name && playerName) {
                        // Check if active combatant matches our assigned token
                        const myTok = (mapState.tokens || []).find(t => t.assigned_player === playerName);
                        if (myTok && (data.active_name === myTok.name || data.active_name === playerName)) {
                            showTurnBanner(data.round || 0);
                        }
                    }
                } catch(e) {}
            });
            
            evtSource.onerror = () => {
                document.getElementById('connection-status').className = 'status-badge disconnected';
                document.getElementById('connection-status').textContent = 'Reconnecting...';
            };
            
            evtSource.onopen = () => {
                document.getElementById('connection-status').className = 'status-badge connected';
                document.getElementById('connection-status').textContent = 'Connected';
            };
        }
        
        // ===========================================
        // RENDERING
        // ===========================================
        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (!mapImage || !mapImage.complete) {
                ctx.fillStyle = '#111';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                return;
            }

            // Auto-accumulate explored: every cell currently visible gets
            // remembered ("seen"). This drives the three-state fog —
            // unexplored = never seen, seen = explored but not in current
            // LOS, visible = in LOS right now.
            _accumulateExplored();

            ctx.save();
            ctx.translate(viewX, viewY);
            ctx.scale(zoom, zoom);

            // Draw map
            ctx.drawImage(mapImage, 0, 0);

            // Draw grid (subtle)
            drawGrid();

            // Draw fog of war (what hasn't been explored)
            drawFogOfWar();

            // Layer colored torch/lantern glows over the lit areas. Painted
            // after the fog so the glow only affects cells that were in LOS.
            drawLights();

            // Draw difficult terrain
            drawDifficultTerrain();

            // Draw AOE templates (spell effects visible to everyone)
            drawTemplates();

            // Draw visible tokens
            drawTokens();

            // Player's personal overlays (local, never broadcast)
            drawPlayerRangeRings();
            drawPlayerRuler();

            ctx.restore();

            // If any token is tweening, keep repainting until it lands.
            if (_anyTokenAnimating()) requestAnimationFrame(render);

            document.getElementById('zoom-display').textContent = Math.round(zoom * 100) + '%';
        }

        // Throttle server sync — we'll add newly seen cells to a pending set
        // and flush to the server at most every 1.5s. Avoids pounding the
        // /api/map/explored endpoint while a PC runs across the map.
        let _pendingExplored = new Set();
        let _lastExploredFlush = 0;
        const EXPLORED_FLUSH_MS = 1500;

        function _accumulateExplored() {
            const vis = calculateVisibleCells();
            const all = vis && vis.all;
            if (!all || all.size === 0) return;
            const known = new Set(mapState.explored || []);
            let added = false;
            for (const key of all) {
                if (!known.has(key)) {
                    known.add(key);
                    _pendingExplored.add(key);
                    added = true;
                }
            }
            if (added) {
                mapState.explored = Array.from(known);
            }
            const now = performance.now();
            if (_pendingExplored.size > 0 && (now - _lastExploredFlush) > EXPLORED_FLUSH_MS) {
                _lastExploredFlush = now;
                const payload = Array.from(known);
                _pendingExplored.clear();
                // Fire-and-forget POST; failure is fine, we'll re-sync next frame.
                fetch('/api/map/explored', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cells: payload })
                }).catch(() => {});
            }
        }
        
        function drawGrid() {
            const gs = mapState.grid_size || 70;
            const ox = mapState.grid_offset_x || 0;
            const oy = mapState.grid_offset_y || 0;
            
            ctx.strokeStyle = 'rgba(255,255,255,0.08)';
            ctx.lineWidth = 1 / zoom;
            
            for (let x = ox; x < mapImage.width; x += gs) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, mapImage.height);
                ctx.stroke();
            }
            
            for (let y = oy; y < mapImage.height; y += gs) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(mapImage.width, y);
                ctx.stroke();
            }
        }
        
        function drawFogOfWar() {
            // Four tiers of cell:
            //   never-seen → solid black (no hint the room exists)
            //   explored, out of LOS → 50% black overlay ("memory")
            //   visible + dim  → navy tint (details washed out)
            //   visible + bright → no overlay (map shows through)
            const gs = mapState.grid_size || 70;
            const ox = mapState.grid_offset_x || 0;
            const oy = mapState.grid_offset_y || 0;
            const explored = new Set(mapState.explored || []);

            const cols = Math.ceil(mapImage.width / gs);
            const rows = Math.ceil(mapImage.height / gs);

            const vis = calculateVisibleCells();
            const brightSet = vis.bright;
            const dimSet = vis.dim;

            for (let gx = 0; gx < cols; gx++) {
                for (let gy = 0; gy < rows; gy++) {
                    const key = `${gx},${gy}`;
                    const isBright = brightSet.has(key);
                    const isDim = dimSet.has(key);
                    const isVisible = isBright || isDim;
                    const isExplored = explored.has(key);
                    const px = gx * gs + ox;
                    const py = gy * gs + oy;

                    if (!isExplored && !isVisible) {
                        ctx.fillStyle = 'rgba(0, 0, 0, 1)';
                        ctx.fillRect(px, py, gs, gs);
                    } else if (isExplored && !isVisible) {
                        ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
                        ctx.fillRect(px, py, gs, gs);
                    } else if (isDim) {
                        // Dim illumination: viewer sees the cell but can't
                        // resolve fine detail. Navy tint mimics moonlight.
                        ctx.fillStyle = 'rgba(15, 25, 50, 0.45)';
                        ctx.fillRect(px, py, gs, gs);
                    }
                    // bright: leave the map pixels alone
                }
            }
        }

        function drawLights() {
            // Paint soft colored glows from every active light. Drawn with
            // 'screen' composite so lights add light instead of overlaying.
            // Only the bright-ring is rendered as a solid radial — the dim
            // ring already shows through via drawFogOfWar's lack of tint
            // on bright cells.
            const ambient = _ambientMode();
            if (ambient === 'bright') return;  // cosmetic lights only in dim/dark
            const lights = _activeLightsPx();
            if (lights.length === 0) return;

            ctx.save();
            ctx.globalCompositeOperation = 'screen';
            for (const L of lights) {
                const grad = ctx.createRadialGradient(L.x, L.y, 0, L.x, L.y, L.dimPx);
                // Use the light's color at full opacity at the bright edge
                // and fade to transparent at the dim edge. Lightens the map
                // without washing everything out.
                const col = L.color || '#ff9c42';
                grad.addColorStop(0, _rgbaFromHex(col, 0.55));
                // Bright ring edge — still solid(ish)
                const brightRatio = L.dimPx > 0 ? L.brightPx / L.dimPx : 1;
                grad.addColorStop(Math.min(0.95, brightRatio), _rgbaFromHex(col, 0.25));
                grad.addColorStop(1, _rgbaFromHex(col, 0));
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(L.x, L.y, L.dimPx, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        function _rgbaFromHex(hex, a) {
            // Accept #rgb / #rrggbb / any-string-falls-through. Used by the
            // light gradient — faster than a full Color library and forgiving
            // of GM-supplied values.
            let h = (hex || '').replace('#', '');
            if (h.length === 3) h = h.split('').map(c => c + c).join('');
            if (h.length !== 6) return `rgba(255, 156, 66, ${a})`;  // torch fallback
            const r = parseInt(h.slice(0,2), 16);
            const g = parseInt(h.slice(2,4), 16);
            const b = parseInt(h.slice(4,6), 16);
            return `rgba(${r}, ${g}, ${b}, ${a})`;
        }

        // ---------- TEMPLATES (player view) ---------------------------------
        // Players just render what the server sends — no placement UI here
        // (that's the GM tool + the ability → template cross-tab flow).
        function _templateFootprint(t) {
            const gs = mapState.grid_size || 70;
            const ox = mapState.grid_offset_x || 0;
            const oy = mapState.grid_offset_y || 0;
            let cx = t.x, cy = t.y;
            if (t.attached_to) {
                const tok = (mapState.tokens || []).find(tt => tt.id === t.attached_to);
                if (tok) {
                    const size = tok.size || 1;
                    const [ax, ay] = _getAnimatedPosition(tok);
                    cx = ax * gs + ox + (gs * size) / 2;
                    cy = ay * gs + oy + (gs * size) / 2;
                }
            }
            return { cx, cy };
        }

        function drawTemplates() {
            const tmpls = mapState.templates || [];
            if (tmpls.length === 0) return;
            const gs = mapState.grid_size || 70;
            ctx.save();
            for (const t of tmpls) {
                const { cx, cy } = _templateFootprint(t);
                const color = t.color || '#ef4444';
                ctx.fillStyle = _rgbaFromHex(color, 0.28);
                ctx.strokeStyle = _rgbaFromHex(color, 0.9);
                ctx.lineWidth = 2 / zoom;
                if (t.type === 'burst' || t.type === 'emanation') {
                    ctx.beginPath();
                    ctx.arc(cx, cy, (t.radius || 2) * gs, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                } else if (t.type === 'cone') {
                    const dir = (t.direction || 0) * Math.PI / 180;
                    const half = ((t.angle || 90) / 2) * Math.PI / 180;
                    const len = (t.length || 4) * gs;
                    ctx.beginPath();
                    ctx.moveTo(cx, cy);
                    ctx.arc(cx, cy, len, dir - half, dir + half);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                } else if (t.type === 'line') {
                    const dir = (t.direction || 0) * Math.PI / 180;
                    const len = (t.length || 4) * gs;
                    const w = (t.width || 1) * gs;
                    const nx = -Math.sin(dir) * w / 2;
                    const ny = Math.cos(dir) * w / 2;
                    const ex = cx + Math.cos(dir) * len;
                    const ey = cy + Math.sin(dir) * len;
                    ctx.beginPath();
                    ctx.moveTo(cx + nx, cy + ny);
                    ctx.lineTo(ex + nx, ey + ny);
                    ctx.lineTo(ex - nx, ey - ny);
                    ctx.lineTo(cx - nx, cy - ny);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                }
                if (t.source || t.name) {
                    const label = t.source || t.name;
                    ctx.font = `${11 / zoom}px system-ui`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    const lw = ctx.measureText(label).width;
                    const pad = 4 / zoom, lh = 16 / zoom;
                    ctx.fillStyle = 'rgba(20,20,30,0.85)';
                    ctx.fillRect(cx - lw/2 - pad, cy - lh/2, lw + pad*2, lh);
                    ctx.fillStyle = _rgbaFromHex(color, 1);
                    ctx.fillText(label, cx, cy);
                }
            }
            ctx.restore();
        }

        // ---------- RULER (player view) -------------------------------------
        // Players get their own ruler — toggled by 'R' key or a floating button.
        // Drags from mousedown to mouseup. State is purely local, never sent.
        let _playerRulerStart = null;
        let _playerRulerEnd = null;
        let _playerRulering = false;

        function pf2eDistanceSquares(fromX, fromY, toX, toY) {
            const ax = Math.abs(toX - fromX);
            const ay = Math.abs(toY - fromY);
            const diagonals = Math.min(ax, ay);
            const straight = Math.abs(ax - ay);
            // PF2e "1,2,1,2" rule — each pair of diagonals costs 1+2=3 squares.
            const diagCost = Math.floor(diagonals / 2) * 3 + (diagonals % 2);
            return straight + diagCost;
        }

        function drawPlayerRuler() {
            if (!_playerRulerStart || !_playerRulerEnd) return;
            const gs = mapState.grid_size || 70;
            const ox = mapState.grid_offset_x || 0;
            const oy = mapState.grid_offset_y || 0;
            const fx = Math.floor((_playerRulerStart.x - ox) / gs);
            const fy = Math.floor((_playerRulerStart.y - oy) / gs);
            const tx = Math.floor((_playerRulerEnd.x - ox) / gs);
            const ty = Math.floor((_playerRulerEnd.y - oy) / gs);
            const squares = pf2eDistanceSquares(fx, fy, tx, ty);
            const feet = squares * 5;
            ctx.save();
            ctx.strokeStyle = '#8ED4D4';
            ctx.lineWidth = 3 / zoom;
            ctx.setLineDash([8 / zoom, 6 / zoom]);
            ctx.beginPath();
            ctx.moveTo(_playerRulerStart.x, _playerRulerStart.y);
            ctx.lineTo(_playerRulerEnd.x, _playerRulerEnd.y);
            ctx.stroke();
            ctx.setLineDash([]);
            for (const p of [_playerRulerStart, _playerRulerEnd]) {
                ctx.fillStyle = '#8ED4D4';
                ctx.beginPath();
                ctx.arc(p.x, p.y, 5 / zoom, 0, Math.PI * 2);
                ctx.fill();
            }
            const mx = (_playerRulerStart.x + _playerRulerEnd.x) / 2;
            const my = (_playerRulerStart.y + _playerRulerEnd.y) / 2;
            const label = `${squares} sq / ${feet} ft`;
            ctx.font = `bold ${14 / zoom}px system-ui`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            const w = ctx.measureText(label).width;
            const pad = 6 / zoom, h = 20 / zoom;
            ctx.fillStyle = 'rgba(20, 20, 30, 0.9)';
            ctx.fillRect(mx - w/2 - pad, my - h/2, w + pad*2, h);
            ctx.strokeStyle = '#8ED4D4';
            ctx.lineWidth = 1 / zoom;
            ctx.strokeRect(mx - w/2 - pad, my - h/2, w + pad*2, h);
            ctx.fillStyle = '#8ED4D4';
            ctx.fillText(label, mx, my);
            ctx.restore();
        }
        
        function calculateVisibleCells() {
            // Returns {bright: Set<"x,y">, dim: Set<"x,y">, all: Set<"x,y">}.
            //
            // A cell can be graded bright (full color), dim (visible but
            // shadowed — player knows tokens are there but loses detail) or
            // unlit/blocked (not in `all`). Grading depends on ambient mode,
            // light rings, and the viewer's senses.
            //
            // bright ambient: every cell in LOS is bright. Lights are cosmetic.
            // dim ambient: lights upgrade cells to bright. Viewers see their
            //   own radius as dim (darkvision/low-light upgrades to bright).
            // dark ambient: only lit cells are visible. Darkvision sees its
            //   own radius as dim; dim-rings upgrade to bright for darkvision
            //   or low-light vision.
            const key = _computeVisibilityKey();
            if (_visibilityCache && _visibilityKey === key) return _visibilityCache;
            _visibilityKey = key;

            const bright = new Set();
            const dim = new Set();
            const gs = mapState.grid_size || 70;
            const ox = mapState.grid_offset_x || 0;
            const oy = mapState.grid_offset_y || 0;
            const ambient = _ambientMode();

            const viewers = _myVisionTokens();
            const walls = mapState.walls || [];
            const lights = _activeLightsPx();

            const cols = Math.ceil(mapImage.width / gs);
            const rows = Math.ceil(mapImage.height / gs);

            for (const pc of viewers) {
                const size = pc.size || 1;
                const cx = pc.x * gs + ox + (gs * size) / 2;
                const cy = pc.y * gs + oy + (gs * size) / 2;

                const visionRadius = pc.vision_radius || 6;  // squares
                const visionPx = visionRadius * gs;
                const hasDV = !!pc.darkvision;
                const hasLL = !!pc.low_light_vision;

                // Upper bound on scan range: the viewer's own radius OR the
                // reach of the furthest light they can potentially stand in.
                // Keeps the nested loop from sweeping the whole map.
                let maxRangePx = visionPx;
                for (const L of lights) {
                    const d = Math.hypot(L.x - cx, L.y - cy);
                    maxRangePx = Math.max(maxRangePx, d + L.dimPx);
                }

                for (let gx = 0; gx < cols; gx++) {
                    for (let gy = 0; gy < rows; gy++) {
                        const k = `${gx},${gy}`;
                        if (bright.has(k)) continue;  // already top-graded

                        const cellCenterX = gx * gs + ox + gs / 2;
                        const cellCenterY = gy * gs + oy + gs / 2;

                        const dist = Math.hypot(cellCenterX - cx, cellCenterY - cy);
                        if (dist > maxRangePx + gs) continue;

                        // LOS check — center first, fall back to corners so a
                        // wall grazing a cell doesn't blank it entirely.
                        let seen = !isBlockedByWalls(cx, cy, cellCenterX, cellCenterY, walls);
                        if (!seen) {
                            const corners = [
                                [gx * gs + ox,           gy * gs + oy],
                                [gx * gs + ox + gs,      gy * gs + oy],
                                [gx * gs + ox,           gy * gs + oy + gs],
                                [gx * gs + ox + gs,      gy * gs + oy + gs],
                            ];
                            for (const [px, py] of corners) {
                                if (!isBlockedByWalls(cx, cy, px, py, walls)) { seen = true; break; }
                            }
                        }
                        if (!seen) continue;

                        // Sample lights at cell center.
                        let inLightBright = false, inLightDim = false;
                        for (const L of lights) {
                            const ld = Math.hypot(cellCenterX - L.x, cellCenterY - L.y);
                            if (ld <= L.brightPx) { inLightBright = true; inLightDim = true; break; }
                            if (ld <= L.dimPx) inLightDim = true;
                        }
                        const inOwnerRange = dist <= visionPx;

                        let grade = null;  // 'bright' | 'dim' | null
                        if (ambient === 'bright') {
                            // Outdoors / torches-unneeded: LOS alone is enough.
                            grade = 'bright';
                        } else if (ambient === 'dim') {
                            if (inLightBright) grade = 'bright';
                            else if (inOwnerRange && (hasDV || hasLL)) grade = 'bright';
                            else if (inLightDim || inOwnerRange) grade = 'dim';
                        } else if (ambient === 'dark') {
                            if (inLightBright) grade = 'bright';
                            else if (inLightDim && (hasDV || hasLL)) grade = 'bright';
                            else if (inLightDim) grade = 'dim';
                            else if (hasDV && inOwnerRange) grade = 'dim';
                            // No sight: unlit darkness = fog.
                        }

                        if (grade === 'bright') { bright.add(k); dim.delete(k); }
                        else if (grade === 'dim' && !bright.has(k)) dim.add(k);
                    }
                }
            }

            const all = new Set(bright);
            for (const k of dim) all.add(k);
            const result = { bright, dim, all };
            _visibilityCache = result;
            return result;
        }
        
        function isBlockedByWalls(x1, y1, x2, y2, walls) {
            for (const wall of walls) {
                if (wall.type === 'door' && wall.open) continue;
                if (wall.type === 'invisible') continue; // Invisible walls don't block vision
                
                const points = wall.points || [];
                if (points.length < 2) continue;
                
                for (let i = 0; i < points.length - 1; i++) {
                    if (lineIntersects(x1, y1, x2, y2, points[i][0], points[i][1], points[i+1][0], points[i+1][1])) {
                        return true;
                    }
                }
                
                if (wall.closed && points.length > 2) {
                    const last = points.length - 1;
                    if (lineIntersects(x1, y1, x2, y2, points[last][0], points[last][1], points[0][0], points[0][1])) {
                        return true;
                    }
                }
            }
            return false;
        }
        
        function lineIntersects(x1, y1, x2, y2, x3, y3, x4, y4) {
            const denom = (y4 - y3) * (x2 - x1) - (x4 - x3) * (y2 - y1);
            if (Math.abs(denom) < 0.0001) return false;
            
            const ua = ((x4 - x3) * (y1 - y3) - (y4 - y3) * (x1 - x3)) / denom;
            const ub = ((x2 - x1) * (y1 - y3) - (y2 - y1) * (x1 - x3)) / denom;
            
            return ua > 0.001 && ua < 0.999 && ub > 0.001 && ub < 0.999;
        }
        
        function drawDifficultTerrain() {
            const gs = mapState.grid_size || 70;
            const ox = mapState.grid_offset_x || 0;
            const oy = mapState.grid_offset_y || 0;
            const explored = new Set(mapState.explored || []);
            const vis = calculateVisibleCells();

            ctx.fillStyle = 'rgba(139, 92, 246, 0.15)';

            for (const cell of (mapState.difficult_terrain || [])) {
                const key = `${cell.x},${cell.y}`;
                // Only show if visible (bright or dim) or explored
                if (explored.has(key) || vis.all.has(key)) {
                    const px = cell.x * gs + ox;
                    const py = cell.y * gs + oy;
                    ctx.fillRect(px, py, gs, gs);
                }
            }
        }
        
        function drawTokens() {
            const gs = mapState.grid_size || 70;
            const ox = mapState.grid_offset_x || 0;
            const oy = mapState.grid_offset_y || 0;
            const vis = calculateVisibleCells();

            for (const token of (mapState.tokens || [])) {
                // Only show visible tokens
                if (token.visible_to_players === false) continue;

                // Check if token is in a visible area (for enemies).
                // NPCs only draw if their cell is in LOS+light (bright or dim).
                const tokenKey = `${token.x},${token.y}`;
                if (!token.is_pc && !vis.all.has(tokenKey)) continue;

                const size = token.size || 1;

                // Apply drag offset if this is our token being dragged,
                // otherwise use the tween position.
                let tokenX, tokenY;
                if (draggingToken && draggingToken.id === token.id) {
                    tokenX = dragStart.tokenX + dragTokenOffset.x;
                    tokenY = dragStart.tokenY + dragTokenOffset.y;
                } else {
                    const [ax, ay] = _getAnimatedPosition(token);
                    tokenX = ax;
                    tokenY = ay;
                }
                
                const cx = tokenX * gs + ox + (gs * size) / 2;
                const cy = tokenY * gs + oy + (gs * size) / 2;
                const r = (gs * size) / 2 - 4;
                
                const isOwn = token.assigned_player === playerName;
                
                // Token circle
                ctx.beginPath();
                ctx.arc(cx, cy, r, 0, Math.PI * 2);
                ctx.fillStyle = token.color || (token.is_pc ? '#22c55e' : '#ef4444');
                ctx.fill();
                
                // Border
                ctx.strokeStyle = isOwn ? '#22c55e' : '#fff';
                ctx.lineWidth = (isOwn ? 4 : 2) / zoom;
                ctx.stroke();
                
                // Initials
                ctx.fillStyle = '#fff';
                ctx.font = `bold ${Math.max(12, r * 0.5)}px system-ui`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const initials = token.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
                ctx.fillText(initials, cx, cy);
                
                // HP bar (for own token)
                if (isOwn && token.max_hp > 0) {
                    const hpPct = Math.max(0, (token.hp || 0) / token.max_hp);
                    const barW = gs * size - 8;
                    const barH = 6/zoom;
                    const barX = cx - barW/2;
                    const barY = cy + r + 4/zoom;
                    
                    ctx.fillStyle = '#333';
                    ctx.fillRect(barX, barY, barW, barH);
                    
                    ctx.fillStyle = hpPct > 0.5 ? '#22c55e' : hpPct > 0.25 ? '#f59e0b' : '#ef4444';
                    ctx.fillRect(barX, barY, barW * hpPct, barH);
                }
            }
        }
        
        // ===========================================
        // MOUSE EVENTS
        // ===========================================
        // Players enter ruler mode by holding Shift on mousedown OR clicking
        // the floating ruler button (which flips _rulerToolActive).
        let _rulerToolActive = false;

        function onMouseDown(e) {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            const mapX = (mouseX - viewX) / zoom;
            const mapY = (mouseY - viewY) / zoom;

            // Ruler: shift-drag anywhere, or any drag while ruler tool active.
            if (_rulerToolActive || e.shiftKey) {
                _playerRulering = true;
                _playerRulerStart = { x: mapX, y: mapY };
                _playerRulerEnd = { x: mapX, y: mapY };
                render();
                return;
            }

            // Check if clicking own token
            if (mapState.player_control && playerName) {
                const token = getOwnTokenAtPoint(mapX, mapY);
                if (token) {
                    draggingToken = token;
                    dragStart = { x: e.clientX, y: e.clientY, tokenX: token.x, tokenY: token.y };
                    dragTokenOffset = { x: 0, y: 0 };
                    document.getElementById('map-container').classList.add('dragging');
                    return;
                }
            }

            // Pan
            isDragging = true;
            dragStart = { x: e.clientX, y: e.clientY, viewX, viewY };
            document.getElementById('map-container').classList.add('dragging');
        }

        function onMouseMove(e) {
            if (_playerRulering) {
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                _playerRulerEnd = { x: (mouseX - viewX) / zoom, y: (mouseY - viewY) / zoom };
                render();
                return;
            }
            if (draggingToken) {
                const gs = mapState.grid_size || 70;
                const dx = e.clientX - dragStart.x;
                const dy = e.clientY - dragStart.y;
                const newX = dragStart.tokenX + Math.round(dx / zoom / gs);
                const newY = dragStart.tokenY + Math.round(dy / zoom / gs);

                // Store offset for rendering
                dragTokenOffset = {
                    x: newX - dragStart.tokenX,
                    y: newY - dragStart.tokenY
                };
                render();
            } else if (isDragging) {
                viewX = dragStart.viewX + (e.clientX - dragStart.x);
                viewY = dragStart.viewY + (e.clientY - dragStart.y);
                render();
            }
        }

        function onMouseUp(e) {
            if (_playerRulering) {
                _playerRulering = false;
                // Leave ruler drawn; any non-shift mousedown will clear it.
                return;
            }
            if (draggingToken && (dragTokenOffset.x !== 0 || dragTokenOffset.y !== 0)) {
                const finalX = dragStart.tokenX + dragTokenOffset.x;
                const finalY = dragStart.tokenY + dragTokenOffset.y;
                moveToken(draggingToken.id, finalX, finalY);
            }
            draggingToken = null;
            dragTokenOffset = { x: 0, y: 0 };
            isDragging = false;
            document.getElementById('map-container').classList.remove('dragging');
            // Clear stale ruler when player clicks to pan (non-shift)
            if (_playerRulerStart && !e.shiftKey && !_rulerToolActive) {
                _playerRulerStart = null;
                _playerRulerEnd = null;
                render();
            }
        }

        function togglePlayerRuler() {
            _rulerToolActive = !_rulerToolActive;
            const btn = document.getElementById('player-ruler-btn');
            if (btn) {
                btn.classList.toggle('active', _rulerToolActive);
                btn.style.background = _rulerToolActive ? 'var(--accent-primary)' : 'var(--bg-surface)';
            }
            if (!_rulerToolActive) {
                _playerRulerStart = null;
                _playerRulerEnd = null;
                render();
            }
        }

        // Player-side range ring — overlays a circle on myToken. Toggle
        // off by clicking the same range again or entering 0/blank.
        let _playerRanges = [];   // [{label, range_ft, color}]

        function promptRangeRing() {
            const v = prompt('Range in feet (blank to clear all)?');
            if (v === null) return;
            if (v === '' || v === '0') { _playerRanges = []; render(); return; }
            const ft = parseInt(v, 10);
            if (!ft || ft < 0) return;
            const exists = _playerRanges.find(r => r.range_ft === ft);
            if (exists) {
                _playerRanges = _playerRanges.filter(r => r.range_ft !== ft);
            } else {
                const palette = ['rgba(239, 68, 68, 0.7)','rgba(59, 130, 246, 0.7)','rgba(34, 197, 94, 0.7)','rgba(168, 85, 247, 0.7)'];
                _playerRanges.push({ label: `${ft} ft`, range_ft: ft, color: palette[_playerRanges.length % palette.length] });
            }
            render();
        }

        function drawPlayerRangeRings() {
            if (!myToken || _playerRanges.length === 0) return;
            const gs = mapState.grid_size || 70;
            const ox = mapState.grid_offset_x || 0;
            const oy = mapState.grid_offset_y || 0;
            const size = myToken.size || 1;
            const [ax, ay] = _getAnimatedPosition(myToken);
            const cx = ax * gs + ox + (gs * size) / 2;
            const cy = ay * gs + oy + (gs * size) / 2;
            ctx.save();
            for (const r of _playerRanges) {
                const px = (r.range_ft / 5) * gs;
                ctx.beginPath();
                ctx.arc(cx, cy, px, 0, Math.PI * 2);
                ctx.strokeStyle = r.color;
                ctx.lineWidth = 2 / zoom;
                ctx.setLineDash([6 / zoom, 4 / zoom]);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.font = `${11 / zoom}px system-ui`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const label = r.label;
                const lw = ctx.measureText(label).width;
                const pad = 4 / zoom, lh = 16 / zoom;
                ctx.fillStyle = 'rgba(20,20,30,0.85)';
                ctx.fillRect(cx - lw/2 - pad, cy - px - lh/2, lw + pad*2, lh);
                ctx.fillStyle = r.color;
                ctx.fillText(label, cx, cy - px);
            }
            ctx.restore();
        }
        // Esc clears the ruler.
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && (_playerRulerStart || _rulerToolActive)) {
                _rulerToolActive = false;
                _playerRulerStart = null;
                _playerRulerEnd = null;
                const btn = document.getElementById('player-ruler-btn');
                if (btn) { btn.classList.remove('active'); btn.style.background = 'var(--bg-surface)'; }
                render();
            } else if (e.key.toLowerCase() === 'r' && !e.ctrlKey && !e.metaKey && !e.altKey) {
                const tag = (e.target && e.target.tagName || '').toLowerCase();
                if (tag === 'input' || tag === 'textarea') return;
                togglePlayerRuler();
            }
        });
        
        function onWheel(e) {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
            const newZoom = Math.max(0.1, Math.min(5, zoom * zoomFactor));
            
            viewX = mouseX - (mouseX - viewX) * (newZoom / zoom);
            viewY = mouseY - (mouseY - viewY) * (newZoom / zoom);
            zoom = newZoom;
            
            render();
        }
        
        function getOwnTokenAtPoint(mapX, mapY) {
            const gs = mapState.grid_size || 70;
            const ox = mapState.grid_offset_x || 0;
            const oy = mapState.grid_offset_y || 0;
            
            for (const token of (mapState.tokens || [])) {
                if (token.assigned_player !== playerName) continue;
                
                const size = token.size || 1;
                const cx = token.x * gs + ox + (gs * size) / 2;
                const cy = token.y * gs + oy + (gs * size) / 2;
                const r = (gs * size) / 2;
                
                if (Math.hypot(mapX - cx, mapY - cy) <= r) {
                    return token;
                }
            }
            return null;
        }
        
        // ===========================================
        // PLAYER ACTIONS
        // ===========================================
        async function setPlayerName() {
            const input = document.getElementById('player-name-input');
            const name = input.value.trim();
            if (name) {
                // Register with server session for secure token auth
                await fetch('/api/map/player/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });
                playerName = name;
                localStorage.setItem('pf2e_player_name', name);
                updateTokenStatus();
                render();
            }
        }
        
        function updateTokenStatus() {
            const status = document.getElementById('token-status');
            myToken = (mapState.tokens || []).find(t => t.assigned_player === playerName);
            
            if (!playerName) {
                status.textContent = 'Enter your name above';
            } else if (myToken) {
                status.textContent = `Playing as ${myToken.name}`;
                status.style.color = '#86efac';
            } else {
                status.textContent = 'No token assigned to you';
                status.style.color = '#fca5a5';
            }
        }
        
        async function moveToken(tokenId, x, y) {
            await fetch('/api/map/token/move', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: tokenId, x, y })
            });
        }
        
        function pingLocation() {
            // Enable ping mode
            document.getElementById('map-container').style.cursor = 'crosshair';
            document.getElementById('map-container').onclick = async (e) => {
                const rect = canvas.getBoundingClientRect();
                const mapX = (e.clientX - rect.left - viewX) / zoom;
                const mapY = (e.clientY - rect.top - viewY) / zoom;
                
                await fetch('/api/map/ping', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ x: mapX, y: mapY, player: playerName || 'Unknown' })
                });
                
                document.getElementById('map-container').style.cursor = '';
                document.getElementById('map-container').onclick = null;
            };
        }
        
        function showPing(x, y, player) {
            // Convert map coords to screen coords
            const screenX = x * zoom + viewX;
            const screenY = y * zoom + viewY;
            
            const ping = document.createElement('div');
            ping.className = 'ping';
            ping.style.left = screenX + 'px';
            ping.style.top = screenY + 'px';
            document.body.appendChild(ping);
            
            setTimeout(() => ping.remove(), 1000);
        }
        
        function checkIfMyTurn(currentTokenId) {
            const indicator = document.getElementById('turn-indicator');
            
            if (myToken && myToken.id === currentTokenId) {
                indicator.classList.add('active');
                document.getElementById('turn-text').textContent = "It's your turn!";
                isMyTurn = true;
            } else {
                indicator.classList.remove('active');
                isMyTurn = false;
            }
        }
        
        // ===========================================
        // DICE ROLLER
        // ===========================================
        function toggleDice() {
            document.getElementById('dice-modal').classList.toggle('active');
        }
        
        function closeDice() {
            document.getElementById('dice-modal').classList.remove('active');
        }
        
        async function rollDice(sides) {
            const roll = Math.floor(Math.random() * sides) + 1;
            const isCrit = sides === 20 && roll === 20;
            const isFumble = sides === 20 && roll === 1;
            
            let resultText = `d${sides}: ${roll}`;
            if (isCrit) resultText = `🎯 NAT 20! d${sides}: ${roll}`;
            if (isFumble) resultText = `💥 NAT 1! d${sides}: ${roll}`;
            
            document.getElementById('dice-result').textContent = resultText;
            document.getElementById('dice-result').style.color = isCrit ? '#22c55e' : isFumble ? '#ef4444' : '#fff';
            
            // Broadcast roll to GM
            await fetch('/api/map/roll', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    player: playerName || 'Unknown',
                    dice: `d${sides}`,
                    result: roll,
                    crit: isCrit,
                    fumble: isFumble
                })
            });
        }
        
        async function rollAttack(attackName, bonus, damageDice) {
            const roll = Math.floor(Math.random() * 20) + 1;
            const total = roll + bonus;
            const isCrit = roll === 20;
            const isFumble = roll === 1;
            
            // Show result popup
            showRollResult(attackName, roll, bonus, total, isCrit, isFumble, damageDice);
            
            // Broadcast to GM
            await fetch('/api/map/roll', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    player: playerName || 'Unknown',
                    attack: attackName,
                    dice: 'd20',
                    roll: roll,
                    bonus: bonus,
                    total: total,
                    crit: isCrit,
                    fumble: isFumble,
                    damage: damageDice
                })
            });
        }
        
        function showRollResult(name, roll, bonus, total, isCrit, isFumble, damage) {
            // Remove any existing popup
            const existing = document.getElementById('roll-popup');
            if (existing) existing.remove();
            
            const popup = document.createElement('div');
            popup.id = 'roll-popup';
            popup.style.cssText = `
                position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
                background: rgba(0,0,0,0.95); border: 2px solid ${isCrit ? '#22c55e' : isFumble ? '#ef4444' : '#3b82f6'};
                padding: 16px 24px; border-radius: 12px; z-index: 500; text-align: center;
                animation: pop-in 0.2s ease-out;
            `;
            popup.innerHTML = `
                <div style="font-size: 12px; color: #888;">${name}</div>
                <div style="font-size: 28px; font-weight: bold; color: ${isCrit ? '#22c55e' : isFumble ? '#ef4444' : '#fff'};">
                    ${isCrit ? '🎯 CRIT! ' : isFumble ? '💥 FUMBLE! ' : ''}${total}
                </div>
                <div style="font-size: 11px; color: #888;">d20(${roll}) + ${bonus}</div>
                ${damage ? `<div style="font-size: 12px; margin-top: 6px; padding-top: 6px; border-top: 1px solid #333;">Damage: ${damage}</div>` : ''}
            `;
            document.body.appendChild(popup);
            
            setTimeout(() => popup.remove(), 5000);
        }
        
        // ===========================================
        // CHARACTER SHEET
        // ===========================================
        function showSheet() {
            if (!myToken) {
                alert('No character assigned to you');
                return;
            }
            
            document.getElementById('sheet-modal').classList.add('active');
            document.getElementById('sheet-name').textContent = myToken.name;
            
            // Load character data
            fetch(`/api/character/${encodeURIComponent(myToken.name)}`)
                .then(r => r.json())
                .then(data => {
                    if (data.success) {
                        renderSheet(data.character);
                    } else {
                        document.getElementById('sheet-body').innerHTML = '<p>Character not found</p>';
                    }
                })
                .catch(() => {
                    document.getElementById('sheet-body').innerHTML = '<p>Error loading character</p>';
                });
        }
        
        function renderSheet(char) {
            document.getElementById('sheet-body').innerHTML = `
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px;">
                    <div style="background: #252525; padding: 12px; border-radius: 8px; text-align: center;">
                        <div style="font-size: 10px; color: #888;">HP</div>
                        <div style="font-size: 20px; font-weight: bold;">${char.current_hp || 0}/${char.hp || 0}</div>
                    </div>
                    <div style="background: #252525; padding: 12px; border-radius: 8px; text-align: center;">
                        <div style="font-size: 10px; color: #888;">AC</div>
                        <div style="font-size: 20px; font-weight: bold;">${char.ac || 10}</div>
                    </div>
                    <div style="background: #252525; padding: 12px; border-radius: 8px; text-align: center;">
                        <div style="font-size: 10px; color: #888;">Speed</div>
                        <div style="font-size: 20px; font-weight: bold;">${char.speed || 25}ft</div>
                    </div>
                </div>
                <p style="color: #888; font-size: 12px;">Full character sheet coming soon...</p>
            `;
        }
        
        function closeSheet() {
            document.getElementById('sheet-modal').classList.remove('active');
        }
        
        // ===========================================
        // TURN TRANSITION BANNER
        // ===========================================
        function showTurnBanner(round) {
            const existing = document.getElementById('turn-banner');
            if (existing) existing.remove();
            
            const banner = document.createElement('div');
            banner.id = 'turn-banner';
            banner.style.cssText = `
                position:fixed; top:0; left:0; right:0; z-index:9999;
                background: linear-gradient(135deg, rgba(94,173,173,0.95), rgba(59,130,246,0.95));
                color:#fff; text-align:center; padding:20px;
                font-family:system-ui,-apple-system,sans-serif; font-size:28px; font-weight:700;
                letter-spacing:0.08em; text-transform:uppercase;
                box-shadow: 0 8px 32px rgba(0,0,0,0.5);
                transform:translateY(-100%); opacity:0;
                animation: turnBannerIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
                pointer-events:none;
            `;
            banner.innerHTML = `
                <div style="text-shadow:0 2px 8px rgba(0,0,0,0.4);">Your Turn</div>
                ${round ? `<div style="font-size:12px; opacity:0.7; letter-spacing:0.15em; margin-top:4px;">Round ${round}</div>` : ''}
            `;
            document.body.appendChild(banner);
            
            setTimeout(() => {
                banner.style.animation = 'turnBannerOut 0.4s ease forwards';
                setTimeout(() => banner.remove(), 400);
            }, 3000);
            
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.frequency.value = 523; gain.gain.value = 0.1;
                osc.start(); osc.stop(ctx.currentTime + 0.15);
                setTimeout(() => {
                    const osc2 = ctx.createOscillator();
                    const gain2 = ctx.createGain();
                    osc2.connect(gain2); gain2.connect(ctx.destination);
                    osc2.frequency.value = 659; gain2.gain.value = 0.1;
                    osc2.start(); osc2.stop(ctx.currentTime + 0.2);
                }, 150);
            } catch(e) {}
        }
        
        // ===========================================
        // INIT
        // ===========================================
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
