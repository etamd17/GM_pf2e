<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Table View &mdash; every world, one table</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0c0a07; --gilt:#e0b65a; --gilt-soft:#c9a34e; --gilt-deep:#a4842b;
    --cream:#f0ead7; --cream-2:#c9bfa3; --muted:#8e8369;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'EB Garamond',Georgia,serif; background:var(--ink); color:var(--cream);
    min-height:100vh; overflow:hidden; position:relative;
    display:flex; align-items:center; justify-content:center; text-align:center;
  }
  /* Warm firelight rising from below + a vignette to frame the world. */
  .bg{position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(120% 80% at 50% 118%, rgba(224,182,90,0.22), rgba(224,182,90,0.05) 38%, transparent 60%),
      radial-gradient(90% 70% at 50% -10%, rgba(120,90,40,0.16), transparent 55%),
      #0c0a07;
  }
  .vignette{position:fixed; inset:0; z-index:1; pointer-events:none;
    box-shadow:inset 0 0 220px 60px rgba(0,0,0,0.7);
    background:radial-gradient(130% 100% at 50% 50%, transparent 55%, rgba(0,0,0,0.55) 100%);}
  /* Drifting embers. */
  .embers{position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden;}
  .ember{position:absolute; bottom:-12px; width:3px; height:3px; border-radius:50%;
    background:var(--gilt); box-shadow:0 0 6px 1px rgba(224,182,90,0.7); opacity:0;
    animation:rise linear infinite;}
  @keyframes rise{
    0%{transform:translateY(0) translateX(0) scale(1); opacity:0;}
    12%{opacity:.9;} 80%{opacity:.4;}
    100%{transform:translateY(-104vh) translateX(24px) scale(.25); opacity:0;}
  }
  .content{position:relative; z-index:2; padding:32px; max-width:680px;}
  .crest{margin:0 auto 26px; width:74px; height:74px; opacity:.92;
    filter:drop-shadow(0 0 14px rgba(224,182,90,0.35));}
  .crest svg{width:100%; height:100%;}
  .title{font-family:'Cinzel',serif; font-weight:800; letter-spacing:.06em;
    font-size:clamp(2.6rem,9vw,5.2rem); line-height:1; text-transform:uppercase;
    background:linear-gradient(180deg,#f7e7b8 0%,#e0b65a 48%,#a4842b 100%);
    -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent;
    filter:drop-shadow(0 2px 18px rgba(224,182,90,0.18));}
  .rule{margin:20px auto 18px; width:min(340px,70%); height:1px; position:relative;
    background:linear-gradient(90deg,transparent,rgba(224,182,90,.55),transparent);}
  .rule::after{content:'\2666'; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    color:var(--gilt); font-size:11px; background:var(--ink); padding:0 10px;}
  .tagline{font-size:clamp(1.05rem,2.6vw,1.45rem); font-style:italic; color:var(--cream-2);
    letter-spacing:.02em;}
  .enter{display:inline-flex; align-items:center; gap:.6rem; margin-top:38px;
    font-family:'Cinzel',serif; font-weight:700; font-size:1.05rem; letter-spacing:.14em;
    text-transform:uppercase; text-decoration:none; color:#1a1407;
    padding:.95rem 2.5rem; border-radius:8px;
    background:linear-gradient(180deg,#f0d88a,#e0b65a 55%,#c9a34e);
    border:1px solid rgba(247,231,184,.6);
    box-shadow:0 0 0 1px rgba(0,0,0,.3), 0 10px 30px rgba(224,182,90,.28), inset 0 1px 0 rgba(255,255,255,.4);
    transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;}
  .enter:hover{transform:translateY(-2px); filter:brightness(1.06);
    box-shadow:0 0 0 1px rgba(0,0,0,.3), 0 16px 42px rgba(224,182,90,.42), inset 0 1px 0 rgba(255,255,255,.5);}
  .enter:active{transform:translateY(0);}
  .enter svg{width:18px; height:18px;}
  .systems{margin-top:34px; font-family:'Cinzel',serif; font-size:.72rem; letter-spacing:.32em;
    text-transform:uppercase; color:var(--muted);}
  .footnote{position:fixed; bottom:16px; left:0; right:0; z-index:2; text-align:center;
    font-size:.74rem; color:rgba(142,131,105,.65); letter-spacing:.04em;}
  @media (prefers-reduced-motion:reduce){ .ember{animation:none; display:none;} }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="embers" aria-hidden="true">
    {% for e in range(18) %}
    <span class="ember" style="left:{{ (e * 53 % 100) }}%; animation-duration:{{ 7 + (e * 7 % 9) }}s; animation-delay:{{ (e * 11 % 13) * 0.6 }}s; width:{{ 2 + (e % 3) }}px; height:{{ 2 + (e % 3) }}px;"></span>
    {% endfor %}
  </div>
  <div class="vignette" aria-hidden="true"></div>

  <main class="content">
    <div class="crest" aria-hidden="true">
      <svg viewBox="0 0 100 100" fill="none" stroke="#e0b65a" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round">
        <polygon points="50,6 88,28 88,72 50,94 12,72 12,28" opacity="0.9"/>
        <polygon points="50,20 76,35 76,65 50,80 24,65 24,35" opacity="0.55"/>
        <path d="M50,20 L50,80 M24,35 L76,65 M76,35 L24,65" opacity="0.35"/>
        <circle cx="50" cy="50" r="7" fill="#e0b65a" stroke="none"/>
      </svg>
    </div>
    <h1 class="title">Table&nbsp;View</h1>
    <div class="rule"></div>
    <p class="tagline">Every world, one table.</p>

    <a class="enter" href="/me">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Enter World
    </a>

    <div class="systems">Pathfinder 2e &nbsp;&middot;&nbsp; Cosmere RPG</div>
  </main>
  <div class="footnote">A live table for in-person play.</div>
</body>
</html>
