<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Table View &mdash; every world, one table</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=EB+Garamond:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0c0a07; --gilt:#e0b65a; --gilt-soft:#c9a34e; --gilt-deep:#a4842b;
    --cream:#f0ead7; --cream-2:#c9bfa3; --muted:#8e8369; --storm:#5fa8e0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{min-height:100%;}
  body{
    font-family:'EB Garamond',Georgia,serif; background:var(--ink); color:var(--cream);
    min-height:100vh; position:relative;
    display:flex; align-items:flex-end; justify-content:center; text-align:center;
    padding:0 20px 8.5vh;
    animation:pageIn .9s ease-out both;
  }
  /* Looping cinematic backdrop + a fallback warm glow for when it can't play. */
  .bg{position:fixed; inset:0; z-index:0;
    background:
      radial-gradient(120% 80% at 50% 118%, rgba(224,182,90,0.22), rgba(224,182,90,0.05) 38%, transparent 60%),
      radial-gradient(90% 70% at 50% -10%, rgba(120,90,40,0.16), transparent 55%),
      #0c0a07;
  }
  .hero{position:fixed; inset:0; z-index:0; background-color:#0c0a07;
    background-image:url("{{ url_for('static', filename='img/landing-hero.jpg') }}");
    background-size:cover; background-position:50% 42%; background-repeat:no-repeat;}
  /* Portrait screens: show the WHOLE image so none of its text is cropped. */
  @media (max-aspect-ratio:1/1){
    .hero{background-size:contain; background-position:50% 16%;}
  }
  /* Scrim: darken the centre (behind the wordmark) and the top/bottom edges so
     the gilt text stays legible over the moving image. */
  /* Video is the hero: keep the upper image bright, anchor the CTA in a dark
     band at the bottom (with a soft pool right behind the button). */
  .scrim{position:fixed; inset:0; z-index:1; pointer-events:none;
    background:
      radial-gradient(70% 42% at 50% 90%, rgba(12,10,7,0.85) 0%, rgba(12,10,7,0.45) 55%, transparent 80%),
      linear-gradient(180deg, rgba(12,10,7,0.30) 0%, rgba(12,10,7,0.04) 22%, rgba(12,10,7,0.05) 50%, rgba(12,10,7,0.48) 73%, rgba(12,10,7,0.95) 100%);
  }
  .vignette{position:fixed; inset:0; z-index:1; pointer-events:none;
    box-shadow:inset 0 0 220px 60px rgba(0,0,0,0.7);
    background:radial-gradient(130% 100% at 50% 50%, transparent 55%, rgba(0,0,0,0.55) 100%);}
  /* Drifting embers. */
  .embers{position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden;}
  .ember{position:absolute; bottom:-12px; width:3px; height:3px; border-radius:50%;
    background:var(--gilt); box-shadow:0 0 6px 1px rgba(224,182,90,0.7); opacity:0;
    animation:rise linear infinite;}
  @keyframes rise{
    0%{transform:translateY(0) translateX(0) scale(1); opacity:0;}
    12%{opacity:.9;} 80%{opacity:.4;}
    100%{transform:translateY(-104vh) translateX(24px) scale(.25); opacity:0;}
  }
  .content{position:relative; z-index:2; padding:8px; max-width:660px;
    animation:contentIn 1.1s .12s ease-out both;}
  /* Compact brand mark above the CTA (the video carries the big headline). */
  .brandmark{font-family:'Cinzel',serif; font-weight:700; letter-spacing:.26em;
    text-transform:uppercase; font-size:1rem; margin-bottom:20px;
    color:#f0d99f; text-shadow:0 1px 2px rgba(0,0,0,.85), 0 0 26px rgba(224,182,90,.35);}
  .brandmark .diamond{color:var(--gilt-soft); font-size:.7em; margin:0 .5em; vertical-align:middle; opacity:.85;}

  .cta{margin-top:0; display:flex; flex-direction:column; align-items:center; gap:14px;}
  .enter{position:relative; overflow:hidden; display:inline-flex; align-items:center; gap:.6rem;
    font-family:'Cinzel',serif; font-weight:700; font-size:1.02rem; letter-spacing:.14em;
    text-transform:uppercase; text-decoration:none; color:#1a1407;
    padding:.95rem 2.5rem; border-radius:8px;
    background:linear-gradient(180deg,#f0d88a,#e0b65a 55%,#c9a34e);
    border:1px solid rgba(247,231,184,.6);
    box-shadow:0 0 0 1px rgba(0,0,0,.3), 0 10px 30px rgba(224,182,90,.28), inset 0 1px 0 rgba(255,255,255,.4);
    transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;}
  .enter:hover{transform:translateY(-2px); filter:brightness(1.06);
    box-shadow:0 0 0 1px rgba(0,0,0,.3), 0 16px 42px rgba(224,182,90,.42), inset 0 1px 0 rgba(255,255,255,.5);}
  .enter:active{transform:translateY(0);}
  .enter svg{width:18px; height:18px;}
  .alt{font-family:'EB Garamond',serif; font-size:.98rem; color:var(--cream-2);
    text-shadow:0 1px 3px rgba(0,0,0,.85);}
  .alt a{color:var(--gilt); text-decoration:none; border-bottom:1px solid rgba(224,182,90,.3); padding-bottom:1px;}
  .alt a:hover{color:#f7e7b8; border-bottom-color:rgba(224,182,90,.7);}

  .systems{margin-top:26px; display:flex; gap:14px; justify-content:center; flex-wrap:wrap;}
  .syschip{display:inline-flex; align-items:center; gap:9px; padding:.5rem 1rem; border-radius:999px;
    font-family:'Cinzel',serif; font-size:.7rem; letter-spacing:.18em; text-transform:uppercase;
    background:rgba(12,10,7,0.5); backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px);}
  .syschip .dot{width:9px; height:9px; border-radius:50%;}
  .syschip.pf{border:1px solid rgba(224,182,90,.34); color:#e9c878;}
  .syschip.pf .dot{background:var(--gilt); box-shadow:0 0 8px rgba(224,182,90,.6);}
  .syschip.cos{border:1px solid rgba(95,168,224,.36); color:#9fd2f2;}
  .syschip.cos .dot{background:var(--storm); box-shadow:0 0 8px rgba(95,168,224,.6);}

  /* --- Ken Burns drift (landscape cover only; portrait stays fully visible so
         none of the art's text is ever cropped) --- */
  @keyframes kenburns{ from{transform:scale(1.02) translate(0,0);} to{transform:scale(1.09) translate(-1.6%,-1.1%);} }
  @media (min-aspect-ratio:1/1){ .hero{ animation:kenburns 42s ease-in-out infinite alternate; will-change:transform; } }

  /* --- Lightning flicker over the storm (right side of the art) --- */
  .lightning{position:fixed; top:0; right:0; width:58%; height:72%; z-index:1; pointer-events:none;
    mix-blend-mode:screen; opacity:0;
    background:radial-gradient(60% 52% at 74% 30%, rgba(150,180,255,.55), rgba(120,90,210,.16) 46%, transparent 72%);
    animation:flicker 9s ease-out infinite;}
  @keyframes flicker{
    0%,1.4%{opacity:0;} 2%{opacity:.95;} 3.2%{opacity:.18;} 4.4%{opacity:.7;} 5.6%{opacity:0;}
    58%{opacity:0;} 59%{opacity:.6;} 60.2%{opacity:.12;} 61.4%{opacity:.5;} 62.6%{opacity:0;} 100%{opacity:0;} }

  /* --- Cool storm-blue motes drifting alongside the gold embers (a Cosmere nod) --- */
  .motes{position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden;}
  .mote{position:absolute; bottom:-10px; border-radius:50%; background:var(--storm);
    box-shadow:0 0 7px 1px rgba(95,168,224,0.6); opacity:0; animation:float linear infinite;}
  @keyframes float{
    0%{transform:translateY(0) translateX(0); opacity:0;}
    18%{opacity:.55;} 82%{opacity:.25;}
    100%{transform:translateY(-92vh) translateX(-22px) scale(.4); opacity:0;} }

  /* --- Enter World gilt shimmer sweep --- */
  .enter::after{content:''; position:absolute; top:0; left:-65%; width:48%; height:100%;
    transform:skewX(-18deg); pointer-events:none;
    background:linear-gradient(105deg, transparent, rgba(255,255,255,0.5), transparent);
    animation:shimmer 5s ease-in-out infinite;}
  @keyframes shimmer{ 0%,16%{left:-65%;} 40%,100%{left:150%;} }

  /* --- On-load entrance: the page fades in and the CTA rises into place --- */
  @keyframes pageIn{ from{opacity:0;} to{opacity:1;} }
  @keyframes contentIn{ from{opacity:0; transform:translateY(16px);} to{opacity:1; transform:translateY(0);} }

  @media (prefers-reduced-motion:reduce){
    .ember, .mote{animation:none; display:none;}
    .lightning{animation:none; display:none;}
    .hero, .enter::after{animation:none;}
    body, .content{animation:none; opacity:1; transform:none;}
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="hero" aria-hidden="true"></div>
  <div class="lightning" aria-hidden="true"></div>
  <div class="scrim" aria-hidden="true"></div>
  <div class="embers" aria-hidden="true">
    {% for e in range(18) %}
    <span class="ember" style="left:{{ (e * 53 % 100) }}%; animation-duration:{{ 7 + (e * 7 % 9) }}s; animation-delay:{{ (e * 11 % 13) * 0.6 }}s; width:{{ 2 + (e % 3) }}px; height:{{ 2 + (e % 3) }}px;"></span>
    {% endfor %}
  </div>
  <div class="motes" aria-hidden="true">
    {% for m in range(11) %}
    <span class="mote" style="left:{{ (m * 37 + 8) % 100 }}%; animation-duration:{{ 13 + (m * 5 % 11) }}s; animation-delay:{{ (m * 9 % 14) * 0.7 }}s; width:{{ 2 + (m % 2) }}px; height:{{ 2 + (m % 2) }}px;"></span>
    {% endfor %}
  </div>
  <div class="vignette" aria-hidden="true"></div>

  <main class="content">
    <div class="brandmark"><span class="diamond">&#9670;</span> Table&nbsp;View <span class="diamond">&#9670;</span></div>
    <div class="cta">
      <a class="enter" href="/me">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Enter World
      </a>
      <p class="alt">New here? <a href="/register">Create an account</a> &middot; Have an invite? <a href="/join">Join a table</a></p>
    </div>

    <div class="systems" aria-label="Supported systems">
      <span class="syschip pf"><span class="dot"></span>Pathfinder 2e</span>
      <span class="syschip cos"><span class="dot"></span>Cosmere RPG</span>
    </div>
  </main>
</body>
</html>
