{% extends "base.html" %}
{% block title %}404 — Page Not Found{% endblock %}

{% block extra_head %}
<style>
    .error-card {
        background: var(--bg-card);
        border: 1px solid var(--border-default);
        border-radius: 0.75rem;
        padding: 3rem 2rem;
        max-width: 32rem;
        margin: 6rem auto 0;
        text-align: center;
    }
    .error-card h1 {
        font-family: 'Cinzel', serif;
        color: var(--gilt-300);
        font-size: 2rem;
        font-weight: 600;
        margin-bottom: 1rem;
    }
    .error-card p {
        color: var(--text-on-dark);
        opacity: 0.8;
        margin-bottom: 2rem;
        line-height: 1.6;
    }
    .error-card .btn-row {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
    }
    .error-card .btn-row a {
        display: inline-block;
        padding: 0.5rem 1.5rem;
        border-radius: 0.375rem;
        font-weight: 500;
        font-size: 0.875rem;
        text-decoration: none;
        transition: background 0.15s, color 0.15s;
        border: 1px solid var(--gilt-300);
        color: var(--gilt-300);
    }
    .error-card .btn-row a:hover {
        background: var(--gilt-300);
        color: var(--bg-card);
    }
</style>
{% endblock %}

{% block content %}
<div class="error-card">
    <h1>Page Not Found</h1>
    <p>The path you seek leads nowhere. Perhaps the map was wrong.</p>
    <div class="btn-row">
        <a href="/">Home</a>
        <a href="/gm">GM Hub</a>
    </div>
</div>
{% endblock %}
