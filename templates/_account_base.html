<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>{% block title %}Account{% endblock %} &middot; PF2E GM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Cinzel:wght@600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d12;--card:#24242e;--ink:#e8e8f0;--muted:#8080a0;--accent:#7DC4C4;--btn:#3A7878;--btn-ink:#A8DEDE;--line:rgba(255,255,255,0.08);}
*{box-sizing:border-box;}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.box{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:32px;max-width:440px;width:100%;}
h1{font-family:'Cinzel',serif;color:var(--accent);font-size:20px;margin:0 0 6px;}
.sub{color:var(--muted);font-size:13px;margin:0 0 18px;}
label{display:block;font-size:12px;color:var(--muted);margin:14px 0 4px;}
input{width:100%;padding:10px 12px;border-radius:6px;border:1px solid var(--line);background:var(--bg);color:var(--ink);font-size:14px;font-family:inherit;}
input:focus{outline:none;border-color:rgba(125,196,196,0.4);}
button{width:100%;margin-top:20px;padding:11px;border-radius:6px;border:none;background:var(--btn);color:var(--btn-ink);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;}
button:hover{background:#4A9696;}
.err{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;padding:9px 12px;border-radius:6px;font-size:13px;margin-bottom:8px;}
a{color:var(--accent);text-decoration:none;}
.muted{color:var(--muted);font-size:12px;}
.list{margin:0;padding:0;list-style:none;}
.row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px;border:1px solid var(--line);border-radius:8px;margin-bottom:8px;background:var(--bg);}
.row .meta{font-size:12px;color:var(--muted);margin-top:3px;}
.row form{margin:0;width:auto;}
.row button{margin:0;width:auto;padding:7px 16px;font-size:12px;}
.badge{display:inline-block;font-size:10px;text-transform:uppercase;letter-spacing:0.05em;color:var(--btn-ink);background:rgba(58,120,120,0.25);padding:2px 7px;border-radius:4px;}
.section-title{font-family:'Cinzel',serif;color:var(--ink);font-size:14px;margin:22px 0 10px;}
.foot{margin-top:20px;text-align:center;}
</style></head><body><div class="box">
{% block content %}{% endblock %}
</div></body></html>
