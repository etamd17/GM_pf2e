<script>
    // ───────────────────────── SHARED SSE HUB ─────────────────────────
    // ONE EventSource('/api/events') per tab. Every feature (GM toast,
    // player nav, chat, SFX, player sheet, loot, Cosmere nav, tracker,
    // party view, …) registers through window.appSSE(eventName, handler)
    // instead of opening its own socket. On the single gunicorn gevent worker
    // each broadcast otherwise fanned out to up to ~6 sockets per tab; this
    // collapses it to one, with a single capped-backoff reconnect that
    // re-attaches every handler to the fresh socket.
    //
    // Included in the <head> of every page that uses appSSE — base.html (and
    // all pages that extend it) plus the standalone full pages (player sheet,
    // player view, mobile combat). Guarded so a double-include is a no-op.
    //
    // LAZY: the socket opens on the FIRST appSSE() call. Each caller keeps its
    // existing gate (GM-only, player-only, …) around its subscribe, so a page
    // that subscribes to nothing opens no connection — as before consolidation.
    if (!window.appSSE) (function () {
        var handlers = Object.create(null);   // eventName -> [fn, ...]
        var es = null;
        var reconnectTimer = null;
        var backoff = 2000;
        var BACKOFF_MAX = 30000;
        var lastConnectAt = 0;
        var lastId = '';   // last server event id seen — replayed-from on reconnect
        // Deploy-version signal: the version the CURRENTLY-LOADED page was served
        // with. Each 'connected' frame reports the server's running version; a
        // mismatch after a reconnect means a new build shipped → offer a reload.
        // tojson (not a bare interpolation): encodes exactly like the connected
        // frame's json.dumps, so the equality check can't false-mismatch on any
        // character, and emits its own JS string quotes.
        var LOADED_VERSION = {{ (app_version or '')|tojson }};
        var _updateShown = false;

        // One recorder per event name tracks the latest id (separate from the
        // feature handlers, so unsubscribe(rawHandler) still works).
        function record(e) { try { if (e && e.lastEventId) lastId = e.lastEventId; } catch (x) {} }

        function attachAll() {
            if (!es) return;
            for (var name in handlers) {
                try { es.addEventListener(name, record); } catch (e) {}
                for (var i = 0; i < handlers[name].length; i++) {
                    try { es.addEventListener(name, handlers[name][i]); } catch (e) {}
                }
            }
        }
        function scheduleReconnect() {
            if (reconnectTimer) return;
            var delay = backoff;
            backoff = Math.min(backoff * 2, BACKOFF_MAX);
            reconnectTimer = setTimeout(function () { reconnectTimer = null; connect(); }, delay);
        }
        function connect() {
            if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
            lastConnectAt = Date.now();
            try { es = new EventSource('/api/events' + (lastId ? ('?last_event_id=' + encodeURIComponent(lastId)) : '')); }
            catch (e) { es = null; scheduleReconnect(); return; }
            es.onopen = function () { backoff = 2000; };
            es.addEventListener('connected', function (e) { backoff = 2000; checkVersion(e); });
            es.onerror = function () {
                // Transient drop (WiFi blip, worker recycle). Close and
                // reconnect on our own schedule rather than letting the
                // browser's native retry race the handler re-attach.
                try { es.close(); } catch (e) {}
                es = null;
                scheduleReconnect();
            };
            attachAll();
        }

        // A new deploy tears down the single worker; the hub reconnects to the
        // NEW process, whose 'connected' frame reports its version. If that
        // differs from the version this page loaded with, a new build shipped.
        function checkVersion(e) {
            var v = '';
            try { v = (JSON.parse((e && e.data) || '{}') || {}).v || ''; } catch (x) {}
            if (v && LOADED_VERSION && v !== LOADED_VERSION) showUpdateToast();
        }
        // Non-intrusive "New version — Reload" toast. NEVER auto-reload an
        // interactive page (a GM mid-turn must not be yanked). Exception: the
        // passive shared table screen (?audience=table) has no operator to click,
        // so it refreshes itself. Self-contained (inline styles, DOM built with
        // textContent) so it needs no possibly-stale CSS and can't inject markup.
        function showUpdateToast() {
            if (_updateShown) return;
            _updateShown = true;
            try {
                if (new URLSearchParams(location.search).get('audience') === 'table') {
                    setTimeout(function () { location.reload(); }, 4000);
                    return;
                }
            } catch (x) {}
            function mount() {
                if (document.getElementById('app-update-toast')) return;
                var bar = document.createElement('div');
                bar.id = 'app-update-toast';
                bar.setAttribute('role', 'status');
                bar.style.cssText = 'position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:100000;display:flex;align-items:center;gap:12px;background:#1b1712;color:#f0ead7;border:1px solid rgba(224,182,90,.55);border-radius:10px;padding:10px 14px;font:13px/1.3 system-ui,sans-serif;box-shadow:0 10px 30px rgba(0,0,0,.5);max-width:92vw;';
                var msg = document.createElement('span');
                msg.textContent = 'A new version is available.';
                var reload = document.createElement('button');
                reload.type = 'button'; reload.textContent = 'Reload';
                reload.style.cssText = 'padding:5px 12px;border-radius:6px;border:1px solid rgba(224,182,90,.6);background:rgba(224,182,90,.18);color:#f0d88a;font-weight:700;cursor:pointer;';
                reload.onclick = function () { location.reload(); };
                var dismiss = document.createElement('button');
                dismiss.type = 'button'; dismiss.textContent = '×';
                dismiss.setAttribute('aria-label', 'Dismiss');
                dismiss.style.cssText = 'background:none;border:none;color:#8e8369;font-size:18px;line-height:1;cursor:pointer;';
                dismiss.onclick = function () { try { bar.remove(); } catch (x) {} };
                bar.appendChild(msg); bar.appendChild(reload); bar.appendChild(dismiss);
                document.body.appendChild(bar);
            }
            if (document.body) mount();
            else document.addEventListener('DOMContentLoaded', mount);
        }

        window.appSSE = function (eventName, handler) {
            if (typeof handler !== 'function') return function () {};
            var firstForName = !handlers[eventName];
            (handlers[eventName] || (handlers[eventName] = [])).push(handler);
            if (es) {
                if (firstForName) { try { es.addEventListener(eventName, record); } catch (e) {} }
                try { es.addEventListener(eventName, handler); } catch (e) {}
            }
            else if (!reconnectTimer) connect();   // first subscriber opens the socket
            // else: mid-reconnect — attachAll() drains the registry on connect
            return function unsubscribe() {
                var arr = handlers[eventName]; if (!arr) return;
                var ix = arr.indexOf(handler); if (ix >= 0) arr.splice(ix, 1);
                if (es) { try { es.removeEventListener(eventName, handler); } catch (e) {} }
            };
        };
        // Escape hatch for diagnostics / a forced reconnect.
        window.__appSSE = {
            isConnected: function () { return !!es; },
            reconnectNow: function () { try { if (es) es.close(); } catch (e) {} es = null; backoff = 2000; connect(); }
        };

        // Wake / online recovery. A slept phone or a dropped Wi-Fi can leave a
        // silently-dead socket that NEVER fires onerror, so the page stops
        // receiving updates with no sign. When the tab becomes visible again,
        // comes back online, or is restored from the bfcache, force a fresh
        // stream — debounced (>10s since last connect) so rapid tab-flips don't
        // thrash. The server re-sends its 'connected' event on the new stream,
        // which the live pages (tracker, sheets) already listen on to refetch.
        function wake() {
            if (typeof document !== 'undefined' && document.visibilityState === 'hidden') return;
            if (!es || (Date.now() - lastConnectAt) > 10000) {
                try { if (es) es.close(); } catch (e) {}
                es = null; backoff = 2000; connect();
            }
        }
        if (typeof document !== 'undefined') document.addEventListener('visibilitychange', wake);
        if (typeof window !== 'undefined') {
            window.addEventListener('online', wake);
            window.addEventListener('pageshow', wake);
            // Campaign-switch guard (belt-and-suspenders behind the server's
            // no-store header, for edge proxies that may ignore it). When THIS
            // page is restored from the back/forward cache (e.persisted) -- Back,
            // or returning to a tab left open before a campaign switch -- its
            // baked-in system skin may be stale (the "says PF2e but Cosmere-
            // themed" mixed menu). Compare the page's stamped system to the
            // session's current one and reload once on mismatch. No-ops on pages
            // that don't stamp data-active-system.
            window.addEventListener('pageshow', function (e) {
                if (!e || !e.persisted) return;
                var baked = (document.body && document.body.dataset) ? document.body.dataset.activeSystem : '';
                if (!baked) return;
                fetch('/api/active_system', { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
                    .then(function (r) { return r.ok ? r.json() : null; })
                    .then(function (d) { if (d && d.system && d.system !== baked) location.reload(); })
                    .catch(function () {});
            });
        }
    })();
</script>
<script>
    // ───────────── TABLE SAFETY: X-Card + Lines & Veils (shared) ─────────────
    // One floating control on every live screen. Any member taps the X-Card to
    // broadcast an anonymous "pause the game" signal (safety_xcard); the GM edits
    // the table's lines & veils, which everyone can view. Backend: /api/safety.
    if (!window.__safetyInit) {
        window.__safetyInit = true;
        (function () {
            function ready(fn){ if (document.readyState !== "loading") fn(); else document.addEventListener("DOMContentLoaded", fn); }
            function esc(s){ var d = document.createElement("span"); d.textContent = String(s == null ? "" : s); return d.innerHTML; }
            var AJAX = { "X-Requested-With": "XMLHttpRequest" };
            ready(function () {
                var css = document.createElement("style");
                css.textContent =
                    "#safety-fab{position:fixed;right:14px;bottom:14px;z-index:99990;width:38px;height:38px;border-radius:50%;border:1px solid rgba(220,120,90,.5);background:rgba(40,20,18,.85);color:#f3b9a3;font:700 14px/1 system-ui,sans-serif;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.4);}" +
                    "#safety-fab:hover{background:rgba(120,40,30,.92);}" +
                    "#safety-panel{position:fixed;right:14px;bottom:60px;z-index:99990;width:300px;max-width:88vw;background:#1b1712;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:14px;color:#e8e0d0;font:13px/1.5 system-ui,sans-serif;box-shadow:0 14px 40px rgba(0,0,0,.5);display:none;max-height:72vh;overflow:auto;}" +
                    "#safety-panel h4{margin:11px 0 3px;font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:#b9b0a0;}" +
                    "#safety-panel ul{margin:0;padding-left:18px;}#safety-panel .empty{opacity:.45;}" +
                    "#safety-panel textarea{width:100%;min-height:44px;background:#14110c;color:#e8e0d0;border:1px solid rgba(255,255,255,.14);border-radius:6px;padding:6px;font:12px/1.4 inherit;box-sizing:border-box;margin-bottom:6px;}" +
                    "#safety-xbtn{width:100%;padding:11px;border-radius:8px;border:1px solid rgba(220,120,90,.55);background:linear-gradient(180deg,#d36e6e,#a83a3a);color:#fff;font-weight:700;cursor:pointer;font-size:14px;}" +
                    "#safety-overlay{position:fixed;inset:0;z-index:99999;background:rgba(10,8,12,.93);display:none;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:24px;color:#f3ece0;}" +
                    "#safety-overlay h1{font:700 34px/1.2 system-ui,sans-serif;margin:0 0 10px;color:#f0d0c0;}" +
                    "#safety-overlay p{max-width:440px;opacity:.85;margin:0 0 22px;}" +
                    "#safety-overlay button{padding:11px 26px;border-radius:9px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.08);color:#fff;cursor:pointer;font-size:15px;}";
                document.head.appendChild(css);

                var fab = document.createElement("button");
                fab.id = "safety-fab"; fab.type = "button"; fab.textContent = "X";
                fab.title = "Safety tools — tap to pause (X-Card) or view the table's lines & veils";
                var panel = document.createElement("div"); panel.id = "safety-panel";
                var overlay = document.createElement("div"); overlay.id = "safety-overlay";
                overlay.innerHTML = "<h1>The game is paused</h1><p>Someone used the X-Card. No reason needed and no blame — take a breath, and the table will check in and adjust.</p><button type=\"button\" id=\"safety-resume\">Resume</button>";
                document.body.appendChild(fab); document.body.appendChild(panel); document.body.appendChild(overlay);

                var open = false;
                function listOr(arr){ return arr.length ? "<ul>" + arr.map(function (x){ return "<li>" + esc(x) + "</li>"; }).join("") + "</ul>" : "<div class=\"empty\">none set</div>"; }
                function renderPanel(rec){
                    var lines = rec.lines || [], veils = rec.veils || [];
                    var html = "<button type=\"button\" id=\"safety-xbtn\">Pause the game (X-Card)</button>" +
                        "<div style=\"font-size:11px;opacity:.6;margin:6px 0 2px;\">A one-tap, anonymous pause. No reason needed.</div>" +
                        "<h4>Lines (hard no)</h4>" + listOr(lines) +
                        "<h4>Veils (off-screen)</h4>" + listOr(veils) +
                        (rec.notes ? "<h4>Notes</h4><div>" + esc(rec.notes) + "</div>" : "");
                    if (rec.can_edit) {
                        html += "<h4>Edit &middot; GM (one per line)</h4>" +
                            "Lines<textarea id=\"sf-lines\">" + esc(lines.join("\n")) + "</textarea>" +
                            "Veils<textarea id=\"sf-veils\">" + esc(veils.join("\n")) + "</textarea>" +
                            "Notes<textarea id=\"sf-notes\">" + esc(rec.notes || "") + "</textarea>" +
                            "<button type=\"button\" id=\"sf-save\" style=\"width:100%;padding:8px;border-radius:7px;border:1px solid rgba(224,182,90,.5);background:rgba(224,182,90,.16);color:#f0d88a;cursor:pointer;\">Save</button>";
                    }
                    panel.innerHTML = html;
                    panel.querySelector("#safety-xbtn").onclick = tapX;
                    var sv = panel.querySelector("#sf-save");
                    if (sv) sv.onclick = saveSafety;
                }
                function loadAndShow(){
                    fetch("/api/safety", { headers: AJAX }).then(function (r){ return r.json(); }).then(renderPanel)
                        .catch(function (){ panel.innerHTML = "<div class=\"empty\">Couldn't load safety info.</div>"; });
                }
                function tapX(){
                    fetch("/api/safety/xcard", { method: "POST", headers: AJAX }).catch(function (){});
                    open = false; panel.style.display = "none"; overlay.style.display = "flex";   // immediate local feedback (SSE also fires for everyone)
                }
                function saveSafety(){
                    var body = { lines: panel.querySelector("#sf-lines").value || "", veils: panel.querySelector("#sf-veils").value || "", notes: panel.querySelector("#sf-notes").value || "" };
                    fetch("/api/safety", { method: "POST", headers: { "Content-Type": "application/json", "X-Requested-With": "XMLHttpRequest" }, body: JSON.stringify(body) })
                        .then(function (r){ return r.json(); }).then(function (){ loadAndShow(); }).catch(function (){});
                }
                fab.onclick = function (){ open = !open; panel.style.display = open ? "block" : "none"; if (open) loadAndShow(); };
                document.addEventListener("click", function (e){ if (open && !panel.contains(e.target) && e.target !== fab) { open = false; panel.style.display = "none"; } });
                overlay.querySelector("#safety-resume").onclick = function (){ overlay.style.display = "none"; };
                if (window.appSSE) window.appSSE("safety_xcard", function (){ overlay.style.display = "flex"; });
            });
        })();
    }
</script>
