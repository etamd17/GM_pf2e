{% extends "_account_base.html" %}
{% block title %}Set up{% endblock %}
{% block content %}
<h1>Create your account</h1>
<p class="sub">This is the first account &mdash; it becomes the site admin (your GM login).</p>
{% if error %}<div class="err">{{ error }}</div>{% endif %}
<form method="POST">
  <label>Display name</label>
  <input name="display_name" placeholder="Evan" autofocus>
  <label>Username</label>
  <input name="username" required placeholder="evan">
  <label>Password</label>
  <input name="password" type="password" required placeholder="at least 6 characters">
  {% if need_token %}
  <label>Setup token</label>
  <input name="setup_token" required placeholder="value of SETUP_TOKEN">
  {% endif %}
  <button type="submit">Create admin account</button>
</form>
{% endblock %}
