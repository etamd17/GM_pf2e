    <!-- LEVEL-UP DRAWER OVERLAY (Proposal 6)                          -->
    <!-- Slides in from the right. Loads level-up page in an iframe.   -->
    <!-- ═══════════════════════════════════════════════════════════════ -->
    <div class="levelup-drawer-backdrop" id="levelup-backdrop" onclick="closeLevelUpDrawer()"></div>
    <div class="levelup-drawer" id="levelup-drawer">
        <div class="levelup-drawer-header">
            <h3> Level Up — {{ pc.name }}</h3>
            <button class="levelup-drawer-close" onclick="closeLevelUpDrawer()" title="Close">×</button>
        </div>
        <iframe id="levelup-iframe" src="about:blank"></iframe>
    </div>
