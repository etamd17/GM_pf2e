<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PF2E Dashboard{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        base:    { 950:'#0f0f14', 900:'#16161e', 800:'#1e1e2a', 700:'#282838', 600:'#363648', 500:'#50506a', 400:'#8080a0', 300:'#a0a0b8', 200:'#c8c8d8', 100:'#e8e8f0' },
                        accent:  { 300:'#7DC4C4', 400:'#5EADAD', 500:'#4A9696', 600:'#3A7878' },
                        gold:    { 300:'#d4a244', 400:'#b8860b', 500:'#9a7209' },
                        danger:  { 300:'#fca5a5', 400:'#f87171', 500:'#ef4444' },
                        success: { 300:'#86efac', 400:'#4ade80', 500:'#22c55e' },
                        info:    { 300:'#93c5fd', 400:'#60a5fa' },
                        spell:   { 300:'#c4b5fd', 400:'#a78bfa' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        display: ['Cinzel', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cinzel:wght@400;600;700&display=swap');
        body { font-family:'Inter',system-ui,sans-serif; background:#0f0f14; color:#e8e8f0; }
        .font-display { font-family:'Cinzel',serif; }
        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:10px; }
        ::-webkit-scrollbar-thumb:hover { background:rgba(255,255,255,0.15); }
        @keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
        .toast-animate { animation:slideIn 0.3s cubic-bezier(0.16,1,0.3,1) forwards; }
        {% block extra_head %}{% endblock %}
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="border-b border-white/[0.06] shrink-0" style="background:#16161e;">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-12">
                <span class="font-display text-accent-300 text-sm font-semibold tracking-wider">PF2E</span>
                <div class="flex gap-1 text-xs font-medium">
                    <a href="/gm" class="text-accent-400 hover:text-accent-300 px-3 py-1.5 rounded transition-colors">GM Hub</a>
                    <a href="/party" class="text-base-400 hover:text-base-200 px-3 py-1.5 rounded transition-colors">Party</a>
                    <a href="/tracker" class="text-base-400 hover:text-base-200 px-3 py-1.5 rounded transition-colors">Tracker</a>
                    <a href="/gm/map" class="text-base-400 hover:text-base-200 px-3 py-1.5 rounded transition-colors">Map</a>
                    <a href="/gmscreen" class="text-base-400 hover:text-base-200 px-3 py-1.5 rounded transition-colors">GM Screen</a>
                    <a href="/encounter_builder" class="text-base-400 hover:text-base-200 px-3 py-1.5 rounded transition-colors">Builder</a>
                    <a href="/generator" class="text-base-400 hover:text-base-200 px-3 py-1.5 rounded transition-colors">Generators</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="flex-1 overflow-y-auto p-4 lg:p-8">
        <div class="max-w-7xl mx-auto">
            {% block content %}{% endblock %}
        </div>
    </div>

    <div id="gm-toast-container" class="fixed top-16 right-4 z-[200] flex flex-col gap-2 pointer-events-none w-72"></div>

    <!-- Dice Roller -->
    <div id="dice-widget" class="fixed bottom-4 right-4 z-[100] flex flex-col items-end">
        <div id="dice-panel" class="hidden mb-3 w-64 rounded-lg overflow-hidden border border-white/[0.08] shadow-2xl" style="background:#1e1e2a;">
            <div class="px-3 py-2 flex justify-between items-center border-b border-white/[0.06]" style="background:#16161e;">
                <span class="text-xs font-semibold text-accent-300">Dice Roller</span>
                <button onclick="toggleDicePanel()" class="text-base-500 hover:text-base-200 text-lg leading-none">&times;</button>
            </div>
            <div class="p-3">
                <div class="rounded border border-white/[0.06] p-3 mb-3 text-center min-h-[70px] flex flex-col justify-center" style="background:#0f0f14;">
                    <div id="dice-total" class="text-3xl font-bold text-accent-300 leading-none">--</div>
                    <div id="dice-breakdown" class="text-[10px] text-base-500 mt-1.5 font-mono">Roll the bones...</div>
                </div>
                <div class="grid grid-cols-4 gap-1.5 mb-3">
                    <button onclick="quickRoll(4)" class="py-1.5 rounded text-xs font-semibold border border-white/[0.08] text-base-300 hover:border-accent-500/30 hover:text-accent-300 transition-colors" style="background:#16161e;">d4</button>
                    <button onclick="quickRoll(6)" class="py-1.5 rounded text-xs font-semibold border border-white/[0.08] text-base-300 hover:border-accent-500/30 hover:text-accent-300 transition-colors" style="background:#16161e;">d6</button>
                    <button onclick="quickRoll(8)" class="py-1.5 rounded text-xs font-semibold border border-white/[0.08] text-base-300 hover:border-accent-500/30 hover:text-accent-300 transition-colors" style="background:#16161e;">d8</button>
                    <button onclick="quickRoll(10)" class="py-1.5 rounded text-xs font-semibold border border-white/[0.08] text-base-300 hover:border-accent-500/30 hover:text-accent-300 transition-colors" style="background:#16161e;">d10</button>
                    <button onclick="quickRoll(12)" class="py-1.5 rounded text-xs font-semibold border border-white/[0.08] text-base-300 hover:border-accent-500/30 hover:text-accent-300 transition-colors" style="background:#16161e;">d12</button>
                    <button onclick="quickRoll(20)" class="col-span-2 py-1.5 rounded text-xs font-bold border border-accent-500/20 text-accent-300 hover:bg-accent-500/10 transition-colors" style="background:#16161e;">d20</button>
                    <button onclick="quickRoll(100)" class="py-1.5 rounded text-xs font-semibold border border-white/[0.08] text-base-300 hover:border-accent-500/30 hover:text-accent-300 transition-colors" style="background:#16161e;">d100</button>
                </div>
                <form id="custom-roll-form" class="flex gap-1.5" onsubmit="event.preventDefault(); customRoll();">
                    <input type="text" id="custom-roll-input" placeholder="2d6+4" class="flex-1 rounded px-2 py-1.5 text-xs text-center font-mono text-base-200 focus:outline-none focus:border-accent-500/50" style="background:#0f0f14; border:1px solid rgba(255,255,255,0.08);">
                    <button type="submit" class="px-3 py-1.5 rounded text-xs font-semibold text-white transition-colors" style="background:#4A9696;">Roll</button>
                </form>
            </div>
        </div>
        <button onclick="toggleDicePanel()" class="w-11 h-11 rounded-full shadow-lg flex items-center justify-center text-white transition-transform hover:scale-105" style="background:#4A9696;">
            <span class="font-display text-sm font-bold">d20</span>
        </button>
    </div>

    <script>
        const dicePanel = document.getElementById('dice-panel');
        const diceTotal = document.getElementById('dice-total');
        const diceBreakdown = document.getElementById('dice-breakdown');
        const customInput = document.getElementById('custom-roll-input');

        function toggleDicePanel() {
            dicePanel.classList.toggle('hidden');
            if (!dicePanel.classList.contains('hidden')) customInput.focus();
        }

        function executeRoll(qty, sides, modStr, modVal) {
            let rolls = [], sum = 0;
            for (let i = 0; i < qty; i++) { let r = Math.floor(Math.random() * sides) + 1; rolls.push(r); sum += r; }
            let bd = `[${rolls.join(', ')}]`;
            if (modStr && modVal) { let m = parseInt(modVal, 10); if (modStr === '+') { sum += m; bd += ` + ${m}`; } else { sum -= m; bd += ` - ${m}`; } }
            diceTotal.style.transform = 'scale(1.15)';
            setTimeout(() => { diceTotal.innerText = sum; diceBreakdown.innerText = `${qty}d${sides}${modStr ? modStr + modVal : ''}: ${bd}`; diceTotal.style.transform = 'scale(1)'; }, 80);
        }
        function quickRoll(sides) { executeRoll(1, sides, null, null); }
        function customRoll() {
            const input = customInput.value.trim().toLowerCase();
            if (!input) return;
            const m = input.match(/^(\d*)d(\d+)(?:\s*([+-])\s*(\d+))?$/);
            if (m) { const q = m[1] ? parseInt(m[1]) : 1; const s = parseInt(m[2]); if (q > 0 && s > 0 && q <= 100) executeRoll(q, s, m[3], m[4]); }
            customInput.value = '';
        }

        // GM toast notifications for player rolls
        if (!window.location.pathname.startsWith('/player')) {
            let lastLogId = null;
            function showToast(log) {
                const c = document.getElementById('gm-toast-container');
                const t = document.createElement('div');
                t.className = 'rounded-lg shadow-xl p-3 toast-animate pointer-events-auto border border-white/[0.08]';
                t.style.background = '#1e1e2a';
                t.innerHTML = `<div class="flex justify-between mb-1"><span class="font-semibold text-accent-300 text-xs">${log.name}</span><span class="text-[10px] text-base-500">Now</span></div><div class="text-base-200 text-xs mb-1">${log.action}</div><div class="text-[10px] font-mono text-base-500 p-1.5 rounded" style="background:#0f0f14;">${log.detail}</div>`;
                c.prepend(t);
                setTimeout(() => { t.style.opacity='0'; t.style.transform='translateX(100%)'; t.style.transition='all 0.3s'; setTimeout(() => t.remove(), 300); }, 6000);
            }
            async function pollCombatLogs() {
                try {
                    const url = lastLogId ? `/api/get_logs?last_id=${lastLogId}` : '/api/get_logs';
                    const r = await fetch(url); const d = await r.json();
                    if (d.logs && d.logs.length > 0) { if (lastLogId !== null) d.logs.forEach(l => showToast(l)); lastLogId = d.logs[d.logs.length - 1].id; }
                } catch(e) {}
            }
            setInterval(pollCombatLogs, 2000); pollCombatLogs();
        }
    </script>
</body>
</html>
