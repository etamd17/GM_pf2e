<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // Apply saved theme immediately to prevent flash of wrong theme
        (function() {
            var t = localStorage.getItem('pf2e_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PF2E Dashboard{% endblock %}</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        base:    { 950:'#0d0d12', 900:'#191920', 800:'#24242e', 700:'#2e2e3c', 600:'#42425a', 500:'#6b6b8a', 400:'#9494b0', 300:'#b8b8cc', 200:'#d8d8e6', 100:'#ededf4' },
                        accent:  { 300:'#8ED4D4', 400:'#6BBFBF', 500:'#52A8A8', 600:'#3F8888' },
                        gold:    { 300:'#e0b050', 400:'#c89620', 500:'#a87e10' },
                        danger:  { 300:'#fca5a5', 400:'#f87171', 500:'#ef4444' },
                        success: { 300:'#86efac', 400:'#4ade80', 500:'#22c55e' },
                        info:    { 300:'#93c5fd', 400:'#60a5fa' },
                        spell:   { 300:'#c4b5fd', 400:'#a78bfa' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                        display: ['Cinzel', 'serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cinzel:wght@400;600;700&display=swap');
        :root, [data-theme="dark"] {
            --bg-body: #0d0d12;
            --bg-surface: #191920;
            --bg-raised: #24242e;
            --bg-hover: #2e2e3c;
            --text-primary: #ededf4;
            --text-secondary: #b8b8cc;
            --text-muted: #6b6b8a;
            --border-subtle: rgba(255,255,255,0.08);
            --border-default: rgba(255,255,255,0.12);
            --accent-primary: #8ED4D4;
            --accent-secondary: #52A8A8;
            --nav-bg: #191920;
        }
        [data-theme="light"] {
            --bg-body: #f0f0f5;
            --bg-surface: #ffffff;
            --bg-raised: #f5f5fa;
            --bg-hover: #eaeaf0;
            --text-primary: #1a1a2e;
            --text-secondary: #4a4a6a;
            --text-muted: #8888aa;
            --border-subtle: rgba(0,0,0,0.08);
            --border-default: rgba(0,0,0,0.12);
            --accent-primary: #3d8f8f;
            --accent-secondary: #2a7070;
            --nav-bg: #ffffff;
        }
        body { font-family:'Inter',system-ui,sans-serif; background:var(--bg-body); color:var(--text-primary); }
        .font-display { font-family:'Cinzel',serif; }
        ::-webkit-scrollbar { width:5px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:var(--border-default); border-radius:10px; }
        ::-webkit-scrollbar-thumb:hover { background:var(--text-muted); }
        @keyframes slideIn { from { transform:translateX(100%); opacity:0; } to { transform:translateX(0); opacity:1; } }
        .toast-animate { animation:slideIn 0.3s cubic-bezier(0.16,1,0.3,1) forwards; }
        {% block extra_head %}{% endblock %}
    </style>
    <!-- Design system — loaded LAST in cascade. Single source of truth
         for the two-color brand (gilt + ruby), neutral grays, and
         strict typography roles. New code consumes classes from here. -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/system.css') }}">
</head>
<body class="min-h-screen flex flex-col">

    <nav class="border-b shrink-0" style="background:var(--nav-bg); border-color:var(--border-subtle);">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-12">
                <span class="font-display text-accent-300 text-sm font-semibold tracking-wider">PF2E</span>
                <div class="flex items-center gap-1 text-xs font-medium">
                    <a href="/gm" class="text-accent-300 hover:text-accent-200 px-3 py-1.5 rounded transition-colors">GM Hub</a>
                    <a href="/party" class="text-base-300 hover:text-base-100 px-3 py-1.5 rounded transition-colors">Party</a>
                    <a href="/tracker" class="text-base-300 hover:text-base-100 px-3 py-1.5 rounded transition-colors">Tracker</a>
                    <a href="/gm/map" class="text-base-300 hover:text-base-100 px-3 py-1.5 rounded transition-colors">Map</a>
                    <a href="/gmscreen" class="text-base-300 hover:text-base-100 px-3 py-1.5 rounded transition-colors">GM Screen</a>
                    <a href="/encounter_builder" class="text-base-300 hover:text-base-100 px-3 py-1.5 rounded transition-colors">Builder</a>
                    <a href="/generator" class="text-base-300 hover:text-base-100 px-3 py-1.5 rounded transition-colors">Generators</a>
                    <span class="mx-1 text-base-600">|</span>
                    <button onclick="toggleTheme()" class="text-base-400 hover:text-base-100 transition-colors px-2 py-1.5" title="Toggle Theme">
                        <span id="theme-icon">&#9788;</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="flex-1 overflow-y-auto p-4 lg:p-8">
        <div class="max-w-7xl mx-auto">
            {% block content %}{% endblock %}
        </div>
    </div>

    <div id="gm-toast-container" class="fixed top-16 right-4 z-[200] flex flex-col gap-2 pointer-events-none w-72"></div>

    <!-- Dice Roller -->
    <div id="dice-widget" class="fixed bottom-4 right-4 z-[100] flex flex-col items-end">
        <div id="dice-panel" class="hidden mb-3 w-64 rounded-lg overflow-hidden shadow-2xl" style="background:var(--bg-raised); border:1px solid var(--border-default);">
            <div class="px-3 py-2 flex justify-between items-center" style="background:var(--bg-surface); border-bottom:1px solid var(--border-subtle);">
                <span class="text-xs font-semibold text-accent-300">Dice Roller</span>
                <button onclick="toggleDicePanel()" class="text-base-500 hover:text-base-200 text-lg leading-none">&times;</button>
            </div>
            <div class="p-3">
                <div class="rounded p-3 mb-3 text-center min-h-[70px] flex flex-col justify-center" style="background:var(--bg-body); border:1px solid var(--border-default);">
                    <div id="dice-total" class="text-3xl font-bold text-accent-300 leading-none">--</div>
                    <div id="dice-breakdown" class="text-[10px] text-base-500 mt-1.5 font-mono">Roll the bones...</div>
                </div>
                <div class="grid grid-cols-4 gap-1.5 mb-3">
                    <button onclick="quickRoll(4)" class="py-1.5 rounded text-xs font-semibold border border-white/[0.08] text-base-300 hover:border-accent-500/30 hover:text-accent-300 transition-colors" style="background:var(--bg-surface);">d4</button>
                    <button onclick="quickRoll(6)" class="py-1.5 rounded text-xs font-semibold border border-white/[0.08] text-base-300 hover:border-accent-500/30 hover:text-accent-300 transition-colors" style="background:var(--bg-surface);">d6</button>
                    <button onclick="quickRoll(8)" class="py-1.5 rounded text-xs font-semibold border border-white/[0.08] text-base-300 hover:border-accent-500/30 hover:text-accent-300 transition-colors" style="background:var(--bg-surface);">d8</button>
                    <button onclick="quickRoll(10)" class="py-1.5 rounded text-xs font-semibold border border-white/[0.08] text-base-300 hover:border-accent-500/30 hover:text-accent-300 transition-colors" style="background:var(--bg-surface);">d10</button>
                    <button onclick="quickRoll(12)" class="py-1.5 rounded text-xs font-semibold border border-white/[0.08] text-base-300 hover:border-accent-500/30 hover:text-accent-300 transition-colors" style="background:var(--bg-surface);">d12</button>
                    <button onclick="quickRoll(20)" class="col-span-2 py-1.5 rounded text-xs font-bold border border-accent-500/20 text-accent-300 hover:bg-accent-500/10 transition-colors" style="background:var(--bg-surface);">d20</button>
                    <button onclick="quickRoll(100)" class="py-1.5 rounded text-xs font-semibold border border-white/[0.08] text-base-300 hover:border-accent-500/30 hover:text-accent-300 transition-colors" style="background:var(--bg-surface);">d100</button>
                </div>
                <form id="custom-roll-form" class="flex gap-1.5" onsubmit="event.preventDefault(); customRoll();">
                    <input type="text" id="custom-roll-input" placeholder="2d6+4" class="flex-1 rounded px-2 py-1.5 text-xs text-center font-mono focus:outline-none" style="background:var(--bg-body); border:1px solid var(--border-default); color:var(--text-primary);">
                    <button type="submit" class="px-3 py-1.5 rounded text-xs font-semibold text-white transition-colors" style="background:#52A8A8;">Roll</button>
                </form>
            </div>
        </div>
        <button onclick="toggleDicePanel()" class="w-11 h-11 rounded-full shadow-lg flex items-center justify-center text-white transition-transform hover:scale-105" style="background:#52A8A8;">
            <span class="font-display text-sm font-bold">d20</span>
        </button>
    </div>

    <script>
        // Theme toggle
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme') || 'dark';
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('pf2e_theme', next);
            document.getElementById('theme-icon').textContent = next === 'dark' ? '\u263C' : '\u263E';
        }
        // Apply saved theme on load
        (function() {
            const saved = localStorage.getItem('pf2e_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
            const icon = document.getElementById('theme-icon');
            if (icon) icon.textContent = saved === 'dark' ? '\u263C' : '\u263E';
        })();

        const dicePanel = document.getElementById('dice-panel');
        const diceTotal = document.getElementById('dice-total');
        const diceBreakdown = document.getElementById('dice-breakdown');
        const customInput = document.getElementById('custom-roll-input');

        function toggleDicePanel() {
            dicePanel.classList.toggle('hidden');
            if (!dicePanel.classList.contains('hidden')) customInput.focus();
        }

        function executeRoll(qty, sides, modStr, modVal) {
            let rolls = [], sum = 0;
            for (let i = 0; i < qty; i++) { let r = Math.floor(Math.random() * sides) + 1; rolls.push(r); sum += r; }
            let bd = `[${rolls.join(', ')}]`;
            if (modStr && modVal) { let m = parseInt(modVal, 10); if (modStr === '+') { sum += m; bd += ` + ${m}`; } else { sum -= m; bd += ` - ${m}`; } }
            diceTotal.style.transform = 'scale(1.15)';
            setTimeout(() => { diceTotal.innerText = sum; diceBreakdown.innerText = `${qty}d${sides}${modStr ? modStr + modVal : ''}: ${bd}`; diceTotal.style.transform = 'scale(1)'; }, 80);
        }
        function quickRoll(sides) { executeRoll(1, sides, null, null); }
        function customRoll() {
            const input = customInput.value.trim().toLowerCase();
            if (!input) return;
            const m = input.match(/^(\d*)d(\d+)(?:\s*([+-])\s*(\d+))?$/);
            if (m) { const q = m[1] ? parseInt(m[1]) : 1; const s = parseInt(m[2]); if (q > 0 && s > 0 && q <= 100) executeRoll(q, s, m[3], m[4]); }
            customInput.value = '';
        }

        // GM toast notifications for player rolls — SSE-driven (no polling).
        // Other pages may open their own EventSource for tracker/map/pc updates;
        // EventSource is cheap, so this connection is dedicated to the toast layer.
        if (!window.location.pathname.startsWith('/player')) {
            // Phase 7: degree-of-success banner shared across GM toasts and
            // the tracker combat-log. Kept on window so tracker.html can use
            // the same styling without duplicating the palette.
            function _degBanner(degree) {
                if (!degree) return '';
                const cfg = {
                    crit_success: {label:'CRIT SUCCESS', bg:'#fbbf24', fg:'#1f1f1f'},
                    success:      {label:'SUCCESS',      bg:'#22c55e', fg:'#052e16'},
                    failure:      {label:'FAILURE',      bg:'#dc2626', fg:'#fff'},
                    crit_failure: {label:'CRIT FAIL',    bg:'#7f1d1d', fg:'#fca5a5'},
                }[degree];
                if (!cfg) return '';
                return `<div style="margin:4px 0 2px; padding:4px 8px; border-radius:4px; background:${cfg.bg}; color:${cfg.fg}; font-weight:800; font-size:10px; letter-spacing:0.08em; text-align:center;">${cfg.label}</div>`;
            }
            window._degBanner = _degBanner;

            // Phase 8: infer damage type from a breakdown string like
            // "1d8 + 4 = 12 slashing" so the "Apply" button sends the right type
            // for W/R/I adjustments. Falls back to 'untyped'.
            function _inferDamageType(detail) {
                if (!detail) return 'untyped';
                const known = ['bludgeoning','piercing','slashing','fire','cold','acid','electricity','sonic','negative','positive','force','mental','poison','bleed','precision','spirit','vitality','void'];
                const lower = detail.toLowerCase();
                for (const t of known) { if (lower.includes(t)) return t; }
                return 'untyped';
            }

            // Phase 8: apply a pasted damage total to a selected encounter
            // participant. `btn` is the chip that was clicked; we replace the
            // chip row with the picker to keep the toast compact.
            async function _toastApplyDamage(btn, amount, dtype) {
                const row = btn.parentNode;
                row.innerHTML = '<span class="text-[10px] text-base-400">Loading…</span>';
                try {
                    const resp = await fetch('/api/tracker_state');
                    const data = await resp.json();
                    const combatants = (data && data.combatants) ? data.combatants : [];
                    if (!combatants.length) {
                        row.innerHTML = '<span class="text-[10px] text-base-400">No active encounter</span>';
                        return;
                    }
                    row.innerHTML = '';
                    const sel = document.createElement('select');
                    sel.className = 'flex-1';
                    sel.style.cssText = 'font-size:10px; padding:2px 4px; border-radius:3px; background:var(--bg-body); border:1px solid var(--border-default); color:var(--text-primary);';
                    sel.innerHTML = '<option value="">Pick target…</option>' + combatants.map(c => `<option value="${c.instance_id}">${c.name} (${c.current_hp}/${c.max_hp})</option>`).join('');
                    const apply = document.createElement('button');
                    apply.textContent = 'Apply';
                    apply.style.cssText = 'padding:2px 8px; font-size:10px; border-radius:3px; background:rgba(220,38,38,0.2); border:1px solid rgba(220,38,38,0.4); color:#fca5a5; font-weight:700; cursor:pointer;';
                    apply.onclick = async () => {
                        const iid = sel.value;
                        if (!iid) { sel.style.borderColor = '#dc2626'; return; }
                        const fd = new FormData();
                        fd.append('amount', String(amount));
                        fd.append('action', 'damage');
                        fd.append('damage_type', dtype);
                        try {
                            const r = await fetch(`/api/adjust_hp/${iid}`, {method:'POST', headers:{'X-Requested-With':'XMLHttpRequest'}, body: fd});
                            if (r.ok) {
                                row.innerHTML = `<span class="text-[10px]" style="color:#86efac;"> Applied ${amount}${dtype!=='untyped'?' '+dtype:''}</span>`;
                            } else {
                                row.innerHTML = '<span class="text-[10px]" style="color:#fca5a5;">Apply failed</span>';
                            }
                        } catch(_) {
                            row.innerHTML = '<span class="text-[10px]" style="color:#fca5a5;">Apply failed</span>';
                        }
                    };
                    row.appendChild(sel);
                    row.appendChild(apply);
                } catch(_) {
                    row.innerHTML = '<span class="text-[10px] text-base-400">Fetch failed</span>';
                }
            }
            window._toastApplyDamage = _toastApplyDamage;

            function showToast(log) {
                const c = document.getElementById('gm-toast-container');
                if (!c) return;
                const t = document.createElement('div');
                t.className = 'rounded-lg shadow-xl p-3 toast-animate pointer-events-auto';
                t.style.background = 'var(--bg-raised)';
                t.style.border = '1px solid var(--border-default)';
                const degHTML = _degBanner(log.degree);

                // Phase 8: if this is a damage roll, show an Apply button that
                // lets the GM push the total onto a picked combatant with one click.
                let applyHTML = '';
                const action = String(log.action || '');
                const isDamageRoll = /^(CRIT )?Damage:/i.test(action);
                const dmgTotal = parseInt(log.result, 10);
                if (isDamageRoll && !isNaN(dmgTotal) && dmgTotal > 0) {
                    const dtype = _inferDamageType(log.detail);
                    applyHTML = `<div class="flex items-center gap-2 mt-1" data-apply-row>
                        <button onclick="_toastApplyDamage(this, ${dmgTotal}, '${dtype}')" style="padding:2px 8px; font-size:10px; border-radius:3px; background:rgba(220,38,38,0.15); border:1px solid rgba(220,38,38,0.35); color:#fca5a5; font-weight:700; cursor:pointer;">Apply ${dmgTotal}${dtype!=='untyped'?' '+dtype:''}</button>
                        <span class="text-[9px] text-base-400">→ pick target</span>
                    </div>`;
                }

                t.innerHTML = `<div class="flex justify-between mb-1"><span class="font-semibold text-accent-300 text-xs">${log.name || ''}</span><span class="text-[10px] text-base-400">Now</span></div><div class="text-xs mb-1" style="color:var(--text-primary)">${log.action || ''}</div>${degHTML}<div class="text-[10px] font-mono text-base-400 p-1.5 rounded" style="background:var(--bg-body)">${log.detail || ''}</div>${applyHTML}`;
                c.prepend(t);
                // Damage-apply toasts stick longer so the GM has time to pick a target.
                const ttl = isDamageRoll ? 15000 : 6000;
                setTimeout(() => { t.style.opacity='0'; t.style.transform='translateX(100%)'; t.style.transition='all 0.3s'; setTimeout(() => t.remove(), 300); }, ttl);
            }
            try {
                const _toastSSE = new EventSource('/api/events');
                _toastSSE.addEventListener('player_roll', function(e) {
                    try { showToast(JSON.parse(e.data)); } catch(_) {}
                });
                // Combat_log events exist for tracker log sync but aren't shown as toasts
                // (they have a different shape — msg/type instead of name/action/detail).
            } catch(_) {}
        }
    </script>
</body>
</html>
